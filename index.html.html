let dispoSeleccion = new Set();
let _guiaFotoDataUrl = null; // temporal storage for guia photo upload // dates selected but not yet confirmed

function buildDisponibilidad(){
  const guia = S.myGuia;
  if(!guia) return '';
  const year = S.calMonth.getFullYear(), month = S.calMonth.getMonth();
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const monthName = new Date(year,month,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});
  const today = new Date().toDateString();
  const offset = (firstDay+6)%7;
  const cells = [];
  for(let i=0;i<offset;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const todosBloqueos = S.bloqueos.filter(b=>b.guia_id===guia.id);
  const haySeleccion = dispoSeleccion.size > 0;

  return `
  <div style="padding:24px;display:flex;flex-direction:column;gap:16px">
    <div style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap">
        <div>
          <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#F9FAFB">Mi disponibilidad</div>
          <div style="font-size:13px;color:#6B7280;margin-top:4px">Toca uno o varios dias para bloquearlos. Confirma al final.</div>
        </div>
        ${haySeleccion ? `
        <div style="display:flex;gap:8px;align-items:center">
          <div style="font-size:13px;font-weight:600;color:#E76F51">${dispoSeleccion.size} dia(s) seleccionado(s)</div>
          <button id="btn-confirmar-bloqueos" style="padding:7px 16px;border-radius:8px;border:none;background:#E63946;color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">Bloquear</button>
          <button id="btn-cancelar-seleccion" style="padding:7px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:white;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif">Cancelar</button>
        </div>` : ''}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <button id="cal-prev" style="padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:white;cursor:pointer;font-family:'DM Sans',sans-serif">‹</button>
        <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#F9FAFB;text-transform:capitalize">${monthName}</div>
        <button id="cal-next" style="padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:white;cursor:pointer;font-family:'DM Sans',sans-serif">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px">
        ${['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:#6B7280;padding:6px 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
        ${cells.map(d=>{
          if(!d) return '<div></div>';
          const dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
          const bloqueo = todosBloqueos.find(b=>b.fecha===dateStr);
          const enSeleccion = dispoSeleccion.has(dateStr);
          const isToday = new Date(year,month,d).toDateString()===today;
          const isPast = new Date(year,month,d) < new Date(new Date().toDateString());
          let bgColor, borderColor, textColor, label2='';
          if(bloqueo){
            bgColor='#fcd5d5'; borderColor='#E63946'; textColor='#E63946';
            label2='<div style="font-size:9px;color:#E63946;font-weight:700;margin-top:2px">BLOQ.</div>';
            if(bloqueo.motivo) label2+='<div style="font-size:9px;color:#E63946;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(bloqueo.motivo)+'</div>';
          } else if(enSeleccion){
            bgColor='#fff3cd'; borderColor='#E9C46A'; textColor='#856404';
            label2='<div style="font-size:9px;color:#D97706;font-weight:700;margin-top:2px">SEL.</div>';
          } else if(isToday){
            bgColor='#1B6B7415'; borderColor='#1B6B74'; textColor='#1B6B74';
          } else {
            bgColor='#F9F8F6'; borderColor='transparent'; textColor='#1A1A1A';
          }
          const cursor = isPast ? 'default' : 'pointer';
          const opacity = isPast ? 0.4 : 1;
          const bloqueoId = bloqueo ? bloqueo.id : '';
          return '<div data-dispo-day="'+dateStr+'" data-bloqueado="'+(bloqueo?'1':'')+'" data-bloqueo-id="'+bloqueoId+'" style="min-height:64px;border-radius:8px;padding:8px 6px;background:'+bgColor+';border:1.5px solid '+borderColor+';cursor:'+cursor+';opacity:'+opacity+';text-align:center;transition:all 0.12s;user-select:none">'
            +'<div style="font-size:13px;font-weight:'+(isToday?700:500)+';color:'+textColor+'">'+(isPast?'':d)+'</div>'
            +label2
            +'</div>';
        }).join('')}
      </div>
      <div style="display:flex;gap:16px;margin-top:16px;font-size:12px;color:#6B7280;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:14px;height:14px;border-radius:3px;background:#fcd5d5;border:1px solid #E63946"></div>Bloqueado</div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:14px;height:14px;border-radius:3px;background:#1E1E1E3cd;border:1px solid #E9C46A"></div>Seleccionado</div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:14px;height:14px;border-radius:3px;background:#F9F8F6;border:1px solid rgba(255,255,255,0.08)"></div>Disponible</div>
      </div>
    </div>
  </div>`;
}

async function toggleBloqueo(dateStr, bloqueoId, motivo){
  const guia = S.myGuia;
  if(!guia) return;
  if(bloqueoId){
    // already blocked - unblock
    if(!confirm('Quitar el bloqueo de este dia?')) return;
    await db.from('bloqueos_disponibilidad').delete().eq('id', bloqueoId);
    toast('Dia desbloqueado', '#52B788');
  } else {
    // block - ask for optional motivo
    const mot = prompt('Motivo (opcional, ej: vacaciones):') || '';
    const {error} = await db.from('bloqueos_disponibilidad').insert({guia_id: guia.id, fecha: dateStr, motivo: mot||null});
    if(error){ toast('Error: '+error.message, '#E63946'); return; }
    toast('Dia bloqueado', '#E63946');
  }
  await loadAll();
}

function buildMobileCalendario(){
  const guia = S.myGuia;
  const year = S.calMonth.getFullYear(), month = S.calMonth.getMonth();
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const monthName = new Date(year,month,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});
  const today = new Date().toDateString();
  const offset = (firstDay+6)%7;
  const cells = [];
  for(let i=0;i<offset;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  // events for this month
  const monthStr = year+'-'+String(month+1).padStart(2,'0');
  const monthEvs = S.eventos.filter(e=>e.guia_id===guia.id&&e.estado==='CONFIRMADO'&&e.fecha.startsWith(monthStr));

  return `
  <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
    <div style="background:#141414;border-radius:14px;padding:16px;border:1px solid rgba(255,255,255,0.08)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <button id="cal-prev" style="width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:white;cursor:pointer;font-size:18px">‹</button>
        <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;text-transform:capitalize">${monthName}</div>
        <button id="cal-next" style="width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:white;cursor:pointer;font-size:18px">›</button>
      </div>
      ${S.mobileCalView==='semana' ? (()=>{
        const todayD=new Date();
        const dow=(todayD.getDay()+6)%7;
        const wStart=new Date(todayD); wStart.setDate(todayD.getDate()-dow);
        const wDays=Array.from({length:7},(_,i)=>{const d=new Date(wStart);d.setDate(wStart.getDate()+i);return d;});
        const dNames=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
        return '<div style="display:flex;flex-direction:column;gap:6px">'+wDays.map((d,i)=>{
          const ds=d.toISOString().slice(0,10);
          const dEvs=monthEvs.filter(e=>e.fecha===ds);
          const isTodayW=d.toDateString()===today;
          return '<div style="display:flex;gap:10px;align-items:flex-start;padding:8px;border-radius:8px;background:'+(isTodayW?T.teal+'15':'transparent')+'">'
            +'<div style="width:44px;text-align:center;flex-shrink:0"><div style="font-size:10px;font-weight:700;color:#6B7280">'+dNames[i]+'</div><div style="font-size:18px;font-weight:700;color:'+(isTodayW?T.teal:'#1A1A1A')+'">'+d.getDate()+'</div></div>'
            +'<div style="flex:1">'
            +(dEvs.length ? dEvs.map(e=>'<div data-mobile-detalle="'+e.id+'" style="background:'+T.teal+';border-radius:8px;padding:8px 10px;margin-bottom:4px;cursor:pointer"><div style="font-size:12px;font-weight:700;color:white">'+esc(e.tipo_evento)+'</div>'+(e.hora_inicio?'<div style="font-size:11px;color:rgba(255,255,255,0.8)">'+e.hora_inicio.slice(0,5)+(e.hora_fin?' → '+e.hora_fin.slice(0,5):'')+'</div>':'')+'</div>').join('')
              : '<div style="font-size:12px;color:#6B7280;padding:8px 0">Sin eventos</div>')
            +'</div></div>';
        }).join('')+'</div>';
      })() : `
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">
        ${['L','M','X','J','V','S','D'].map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:#6B7280;padding:4px 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
        ${cells.map(d=>{
          if(!d) return '<div></div>';
          const dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
          const dayEvs = monthEvs.filter(e=>e.fecha===dateStr);
          const isToday = new Date(year,month,d).toDateString()===today;
          return `<div style="aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${dayEvs.length?T.teal:isToday?T.teal+'15':'transparent'};cursor:${dayEvs.length?'pointer':'default'}" ${dayEvs.length?`data-mobile-cal-day="${dateStr}"`:''}><div style="font-size:13px;font-weight:${isToday||dayEvs.length?700:400};color:${dayEvs.length?'white':isToday?T.teal:'#1A1A1A'}">${d}</div>${dayEvs.length>0?`<div style="width:4px;height:4px;border-radius:50%;background:white;margin-top:1px"></div>`:''}</div>`;
        }).join('')}
      </div>`}
    </div>

    <!-- Event list for month -->
    <div style="background:#141414;border-radius:14px;padding:16px;border:1px solid rgba(255,255,255,0.08)">
      <div style="font-size:13px;font-weight:700;color:#F9FAFB;margin-bottom:12px">Eventos del mes (${monthEvs.length})</div>
      ${monthEvs.length ? [...monthEvs].sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(e=>{
        const fecha = new Date(e.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long'});
        return `<div data-mobile-detalle="${e.id}" style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;display:flex;align-items:center;gap:12px">
          <div style="width:4px;height:40px;border-radius:2px;background:${T.teal};flex-shrink:0"></div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600;color:#F9FAFB">${esc(e.tipo_evento)}${e.nro_file?' · '+esc(e.nro_file):''}</div>
            <div style="font-size:12px;color:#6B7280;margin-top:2px;text-transform:capitalize">${fecha}${e.hora_inicio?' · '+e.hora_inicio.slice(0,5):''}</div>
          </div>
          <div style="color:#6B7280">›</div>
        </div>`;
      }).join('') : '<div style="font-size:13px;color:#6B7280;text-align:center;padding:16px 0">Sin eventos este mes</div>'}
    </div>
  </div>`;
}

// ── LIQUIDACIONES ────────────────────────────────────────────────────────────
function buildReconfirmaciones(){
  const hoy = new Date();
  const en7dias = new Date(hoy.getTime() + 7*24*60*60*1000);

  const eventos = S.eventos
    .filter(e => {
      if(e.estado !== 'CONFIRMADO' || !e.guia_id) return false;
      const fechaEv = new Date(e.fecha + 'T12:00:00');
      return fechaEv >= hoy && fechaEv <= en7dias;
    })
    .sort((a,b) => a.fecha.localeCompare(b.fecha));

  const urgentes  = eventos.filter(e => reconfStatus(e) === 'urgent');
  const warnings  = eventos.filter(e => reconfStatus(e) === 'warning');
  const reconfOk  = eventos.filter(e => reconfStatus(e) === 'ok');

  const renderCard = (e, nivel) => {
    const guia  = S.guias.find(g=>g.id===e.guia_id);
    const file  = S.files.find(f=>f.id===e.file_id);
    const fechaStr = new Date(e.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long'});
    const hoy2 = new Date();
    const diffHrs = Math.round((new Date(e.fecha+'T12:00:00') - hoy2) / (1000*60*60));
    const diffLabel = diffHrs < 24 ? diffHrs+'hs' : Math.floor(diffHrs/24)+'d';
    const isUrgent = nivel === 'urgent';
    const isOk     = nivel === 'ok';
    const borderColor = isOk?'#52B788':isUrgent?'#E63946':'#E9C46A';
    const bgColor     = isOk?'#F8FFF9':isUrgent?'#FFF5F5':'#FFFDF0';

    return `
    <div style="background:${bgColor};border:1.5px solid ${borderColor};border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px">
      <div style="flex-shrink:0;width:44px;height:44px;border-radius:50%;overflow:hidden;border:2px solid ${borderColor}">
        ${guia?.foto_url
          ? `<img src="${esc(guia.foto_url)}" style="width:100%;height:100%;object-fit:cover"/>`

      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:#F9FAFB">${esc(e.tipo_evento)}</div>
        <div style="font-size:11px;color:#9CA3AF;margin-top:2px">
          📅 ${fechaStr}${e.hora_inicio?' · 🕐 '+String(e.hora_inicio).slice(0,5):''}
          ${file?' · 📁 '+esc(file.nro_file):''}
        </div>
        <div style="font-size:11px;margin-top:3px">
          👤 <strong>${guia?esc(guia.nombre+' '+guia.apellido):'—'}</strong>
          ${guia?.telefono?` · <a href="https://wa.me/${guia.telefono.replace(/[^0-9]/g,'')}" target="_blank" style="color:#25D366;font-weight:600;text-decoration:none">📲 WhatsApp</a>`:''}
        </div>
        ${isOk?`<div style="font-size:10px;color:#2E7D32;font-weight:600;margin-top:3px">✅ Reconfirmado el ${new Date(e.reconfirmado_at).toLocaleDateString('es-AR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>`:''}

      <div style="text-align:right;flex-shrink:0">

        ${!isOk?`<div style="font-size:9px;font-weight:700;color:${borderColor};margin-top:2px">${isUrgent?'⚠️ URGENTE':'⏳ PENDIENTE'}</div>`:''}
      </div>

  };

  <div style="padding:24px;max-width:900px;display:flex;flex-direction:column;gap:20px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#F9FAFB">⚠️ Reconfirmaciones</div>
        <div style="font-size:13px;color:#6B7280;margin-top:4px">Eventos de los próximos 7 días que requieren reconfirmación del guía</div>
      </div>
      <div style="display:flex;gap:10px">
        ${urgentes.length?`<div style="background:#1F0D0D;border:1.5px solid #E63946;border-radius:8px;padding:8px 14px;text-align:center"><div style="font-size:20px;font-weight:700;color:#E63946">${urgentes.length}</div><div style="font-size:10px;color:#E63946;font-weight:700">URGENTES</div></div>`:''}
        ${warnings.length?`<div style="background:#FFFDF0;border:1.5px solid #E9C46A;border-radius:8px;padding:8px 14px;text-align:center"><div style="font-size:20px;font-weight:700;color:#D97706">${warnings.length}</div><div style="font-size:10px;color:#D97706;font-weight:700">PENDIENTES</div></div>`:''}
        ${reconfOk.length?`<div style="background:#0D1F14;border:1.5px solid #52B788;border-radius:8px;padding:8px 14px;text-align:center"><div style="font-size:20px;font-weight:700;color:#2E7D32">${reconfOk.length}</div><div style="font-size:10px;color:#2E7D32;font-weight:700">CONFIRMADOS</div></div>`:''}
      </div>
    </div>

    ${urgentes.length===0 && warnings.length===0 && reconfOk.length===0 ? `
      <div style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:48px;text-align:center;color:#6B7280">
        <div style="font-size:40px;margin-bottom:12px">✅</div>
        <div style="font-size:15px;font-weight:600">Todo en orden</div>
        <div style="font-size:13px;margin-top:6px">No hay eventos que requieran reconfirmación esta semana</div>
      </div>
    ` : ''}

    ${urgentes.length>0?`
      <div>
        <div style="font-size:11px;font-weight:700;color:#E63946;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">🔴 Menos de 48hs — Contactar urgente</div>
        <div style="display:flex;flex-direction:column;gap:8px">${urgentes.map(e=>renderCard(e,'urgent')).join('')}</div>
      </div>

    ${warnings.length>0?`
      <div>
        <div style="font-size:11px;font-weight:700;color:#D97706;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">⏳ Entre 48hs y 7 días — Esperando reconfirmación</div>
        <div style="display:flex;flex-direction:column;gap:8px">${warnings.map(e=>renderCard(e,'warning')).join('')}</div>
      </div>
    `:''}

    ${reconfOk.length>0?`
      <div>
        <div style="font-size:11px;font-weight:700;color:#2E7D32;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">✅ Reconfirmados</div>
        <div style="display:flex;flex-direction:column;gap:8px">${reconfOk.map(e=>renderCard(e,'ok')).join('')}</div>
      </div>
    `:''}
  </div>`;
}


function buildLiquidaciones(){
  if(isAdmin()) return buildLiquidacionesAdmin();
  return buildLiquidacionesGuia();
}

function buildLiquidacionesGuia(){
  const guiaId = S.myGuia?.id;
  const valorHora = S.myGuia?.valor_hora || 0;

  // Agrupar eventos confirmados del guía por file_id
  const misEventos = S.eventos.filter(e=>e.estado==='CONFIRMADO' && e.guia_id===guiaId);

  // Archivos con al menos un evento mío
  const misFiles = S.files.filter(f=> misEventos.some(e=>e.file_id===f.id));
  // Eventos sin file (standalone)
  const sinFile = misEventos.filter(e=>!e.file_id);

  // Helper: liq de un evento
  const liqDeEvento = e => S.liquidaciones?.find(l=>l.evento_id===e.id && l.guia_id===guiaId);

  const renderEvento = (e, compact=false) => {
    const liq = liqDeEvento(e);
    const fecha = new Date(e.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'short',day:'2-digit',month:'short'});
    return `
    <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.05);background:${liq?'#F8FFF9':'white'}">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:#F9FAFB">${esc(e.tipo_evento)}</div>
        <div style="font-size:11px;color:#6B7280">${fecha}${e.hora_inicio?' · '+String(e.hora_inicio).slice(0,5):''}</div>
      </div>
      ${liq ? `
        <div style="text-align:right;margin-right:4px">
          <div style="font-size:13px;font-weight:700;color:#2E7D32">$${liq.total.toLocaleString('es-AR')}</div>
          <div style="font-size:9px;color:#6B7280;text-transform:uppercase">${liq.estado}</div>
        </div>
        <button onclick="verLiquidacion(${liq.id})" style="padding:5px 10px;border-radius:6px;border:1px solid #D4EDDA;background:white;font-size:11px;cursor:pointer;color:#2E7D32;font-weight:600;font-family:'DM Sans',sans-serif">👁</button>
      ` : e.fecha <= new Date().toISOString().slice(0,10) ? `
        <button onclick="nuevaLiquidacion(${e.id})" style="padding:5px 12px;border-radius:6px;border:none;background:#E76F51;color:white;font-size:11px;cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif">+ Liquidar</button>
      ` : `
        <span style="font-size:10px;color:#6B7280;padding:4px 8px">Pendiente</span>
      `}
    </div>`;
  };

  const renderFile = (file) => {
    const evs = misEventos.filter(e=>e.file_id===file.id).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    const liqs = evs.map(e=>liqDeEvento(e)).filter(Boolean);
    const todosLiquidados = evs.length>0 && liqs.length===evs.length;
    const algunoLiquidado = liqs.length>0;
    const totalLiqs = liqs.reduce((s,l)=>s+(l.total||0),0);
    const hoyStr = new Date().toISOString().slice(0,10);
    const sinLiquidar = evs.filter(e=>!liqDeEvento(e) && e.fecha <= hoyStr);
    const expanded = S.liqFileExpanded?.[file.id];

    return `
    <div style="background:#1E1E1E;border:1px solid ${todosLiquidados?'#A5D6A7':'#E8E4DD'};border-radius:12px;overflow:hidden;margin-bottom:12px">
      <div style="background:${todosLiquidados?'linear-gradient(135deg,#2E7D32,#52B788)':'linear-gradient(135deg,#1B6B74,#2A9D8F)'};padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer"
           onclick="toggleLiqFile('${file.id}')">
        <div style="flex:1">
          <div style="color:white;font-size:14px;font-weight:700">
            ${todosLiquidados?'✅ ':'📁 '}${esc(file.nro_file)}
            ${todosLiquidados?'<span style="font-size:11px;opacity:0.8;margin-left:6px">— Liquidado</span>':''}
          </div>
          <div style="color:rgba(255,255,255,0.75);font-size:11px;margin-top:2px">
            ${evs.length} evento(s) · ${algunoLiquidado?liqs.length+' liquidado(s)':'Sin liquidar'}
            ${algunoLiquidado?' · $'+totalLiqs.toLocaleString('es-AR'):''}
          </div>
        </div>
        ${!todosLiquidados && sinLiquidar.length>0 ? `
          <button onclick="event.stopPropagation();liquidarViaje('${file.id}')" style="padding:6px 12px;border-radius:7px;border:2px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.15);color:white;font-size:11px;cursor:pointer;font-weight:700;font-family:'DM Sans',sans-serif">
            💰 Liquidar viaje
          </button>
        ` : ''}
        <div style="color:white;font-size:16px">${expanded?'▾':'▸'}</div>
      </div>
      ${expanded ? `<div>${evs.map(e=>renderEvento(e)).join('')}</div>` : ''}
    </div>`;
  };

  return `
  <div style="padding:24px;display:flex;flex-direction:column;gap:4px;max-width:860px">
    <div style="font-size:12px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px">💰 Mis liquidaciones</div>
    ${misFiles.length===0 && sinFile.length===0 ? `
      <div style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:48px;text-align:center;color:#6B7280">
        <div style="font-size:40px;margin-bottom:12px">💰</div>
        <div style="font-size:15px">No tenés eventos confirmados para liquidar</div>
      </div>
    ` : ''}
    ${misFiles.map(f=>renderFile(f)).join('')}
    ${sinFile.length>0 ? `
      <div style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden;margin-bottom:12px">
        <div style="background:#1A1A1A;padding:12px 18px;font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em">Eventos sin viaje</div>
        ${sinFile.map(e=>renderEvento(e)).join('')}
      </div>
    ` : ''}
  </div>`;
}

function buildLiquidacionesAdmin(){
  const allLiqs = S.liquidaciones || [];
  const total = allLiqs.reduce((s,l)=>s+l.total,0);
  const pendientesCount = allLiqs.filter(l=>l.estado==='PENDIENTE').length;
  const aprobadas = allLiqs.filter(l=>l.estado==='APROBADA').length;
  const pagadas = allLiqs.filter(l=>l.estado==='PAGADA').length;

  // Group liquidaciones by file
  // Build a map: fileId -> {file, guia, liqs[]}
  const porFile = {};
  const sinFile = [];

  allLiqs.forEach(l=>{
    const evento = S.eventos.find(e=>e.id===l.evento_id);
    const fileId = evento?.file_id;
    const file = fileId ? S.files.find(f=>f.id===fileId) : null;
    if(file){
      if(!porFile[fileId]) porFile[fileId] = {file, liqs:[]};
      porFile[fileId].liqs.push({l, evento});
    } else {
      sinFile.push({l, evento});
    }
  });

  const estadoColor = st => st==='PAGADA'?{bg:'#D4EDDA',fg:'#155724'}:st==='APROBADA'?{bg:'#D1ECF1',fg:'#0c5460'}:{bg:'#FFF3CD',fg:'#856404'};

  const renderLiqRow = (l, evento) => {
    const guia = S.guias.find(g=>g.id===l.guia_id);
    const fecha = evento?.fecha ? new Date(evento.fecha+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short'}) : '—';
    const ec = estadoColor(l.estado);
    return `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,0.05);background:white">
      <div style="width:24px;height:24px;border-radius:50%;background:rgba(231,111,81,0.12);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#E76F51;flex-shrink:0">${guia?esc(guia.nombre[0]):'?'}</div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:600;color:#F9FAFB">${guia?esc(guia.nombre+' '+guia.apellido):'—'} · <span style="font-weight:400;color:#9CA3AF">${evento?esc(evento.tipo_evento):'—'}</span></div>
        <div style="font-size:11px;color:#6B7280">${fecha} · ${l.horas}h · $${(l.valor_hora||0).toLocaleString('es-AR')}/h</div>
      </div>
      ${l.gastos_extras?`<div style="font-size:11px;color:#9CA3AF">+$${l.gastos_extras.toLocaleString('es-AR')} extras</div>`:''}
      <div style="font-size:13px;font-weight:700;color:#E76F51;min-width:70px;text-align:right">$${l.total.toLocaleString('es-AR')}</div>
      <span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px;background:${ec.bg};color:${ec.fg};white-space:nowrap">${l.estado}</span>
      <div style="display:flex;gap:4px">
        <button onclick="verLiquidacion(${l.id})" style="padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:white;font-size:10px;cursor:pointer;color:#E76F51;font-weight:600">👁</button>
        ${l.estado==='PENDIENTE'?`<button onclick="cambiarEstadoLiq(${l.id},'APROBADA')" style="padding:4px 8px;border-radius:6px;border:none;background:#0D1820;font-size:10px;cursor:pointer;color:#60A5FA;font-weight:600">✓ Aprobar</button>`:''}
        ${l.estado==='APROBADA'?`<button onclick="cambiarEstadoLiq(${l.id},'PAGADA')" style="padding:4px 8px;border-radius:6px;border:none;background:#0D2010;font-size:10px;cursor:pointer;color:#4ADE80;font-weight:600">✓ Pagar</button>`:''}
      </div>
    </div>`;
  };

  const renderFileBlock = (fileId) => {
    const {file, liqs} = porFile[fileId];
    const totalFile = liqs.reduce((s,{l})=>s+l.total,0);
    const pendFile = liqs.filter(({l})=>l.estado==='PENDIENTE');
    const aprobFile = liqs.filter(({l})=>l.estado==='APROBADA');
    const todoPagado = liqs.every(({l})=>l.estado==='PAGADA');
    const todoAprobado = liqs.every(({l})=>l.estado==='APROBADA'||l.estado==='PAGADA');
    const expanded = S.liqAdminExpanded?.[fileId];
    const headerBg = todoPagado ? 'linear-gradient(135deg,#2E7D32,#52B788)' : todoAprobado ? 'linear-gradient(135deg,#0c5460,#17a2b8)' : 'linear-gradient(135deg,#1B6B74,#2A9D8F)';

    return `
    <div style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden;margin-bottom:12px">
      <div style="background:${headerBg};padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer" onclick="toggleLiqAdmin('${fileId}')">
        <div style="flex:1">
          <div style="color:white;font-size:14px;font-weight:700">
            ${todoPagado?'✅':todoAprobado?'☑️':'📁'} ${esc(file.nro_file)}
            ${todoPagado?'<span style="font-size:11px;opacity:0.8;margin-left:6px">— Pagado</span>':todoAprobado?'<span style="font-size:11px;opacity:0.8;margin-left:6px">— Aprobado</span>':''}
          </div>
          <div style="color:rgba(255,255,255,0.75);font-size:11px;margin-top:2px">
            ${liqs.length} liquidación(es) · $${totalFile.toLocaleString('es-AR')}
            ${pendFile.length?` · <strong>${pendFile.length} pendiente(s)</strong>`:''}
            ${aprobFile.length?` · ${aprobFile.length} aprobada(s)`:''}
          </div>
        </div>
        ${pendFile.length>0?`
          <button onclick="event.stopPropagation();aprobarViajeLiqs('${fileId}')" style="padding:6px 12px;border-radius:7px;border:2px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.15);color:white;font-size:11px;cursor:pointer;font-weight:700;font-family:'DM Sans',sans-serif">
            ✓ Aprobar viaje
          </button>
        `:''}
        ${aprobFile.length>0&&!todoPagado?`
          <button onclick="event.stopPropagation();pagarViajeLiqs('${fileId}')" style="padding:6px 12px;border-radius:7px;border:2px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.15);color:white;font-size:11px;cursor:pointer;font-weight:700;font-family:'DM Sans',sans-serif">
            💰 Pagar viaje
          </button>
        `:''}
        <div style="color:white;font-size:16px">${expanded?'▾':'▸'}</div>
      </div>
      ${expanded?`<div>${liqs.sort((a,b)=>(a.evento?.fecha||'').localeCompare(b.evento?.fecha||'')).map(({l,evento})=>renderLiqRow(l,evento)).join('')}</div>`:''}
    </div>`;
  };

  return `
  <div style="padding:24px;display:flex;flex-direction:column;gap:16px;max-width:1000px">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
      <div style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px">
        <div style="font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Total</div>
        <div style="font-size:24px;font-weight:700;color:#E76F51">$${total.toLocaleString('es-AR')}</div>
      </div>
      <div style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px">
        <div style="font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Pendientes</div>
        <div style="font-size:24px;font-weight:700;color:#E9C46A">${pendientesCount}</div>
      </div>
      <div style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px">
        <div style="font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Aprobadas</div>
        <div style="font-size:24px;font-weight:700;color:#60A5FA">${aprobadas}</div>
      </div>
      <div style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px">
        <div style="font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Pagadas</div>
        <div style="font-size:24px;font-weight:700;color:#2E7D32">${pagadas}</div>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end">
      <button onclick="exportLiquidaciones()" style="${btnS}padding:7px 16px;font-size:12px">⬇ Exportar cuenta corriente</button>
    </div>

    ${allLiqs.length===0?`
      <div style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:48px;text-align:center;color:#6B7280">
        <div style="font-size:40px;margin-bottom:12px">💰</div>
        <div>Sin liquidaciones cargadas aún</div>
      </div>
    `:Object.keys(porFile).map(fileId=>renderFileBlock(fileId)).join('')}

    ${sinFile.length>0?`
      <div style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden">
        <div style="background:#1A1A1A;padding:12px 18px;font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em">Sin viaje asignado</div>
        ${sinFile.map(({l,evento})=>renderLiqRow(l,evento)).join('')}
      </div>
    `:''}
  </div>`;
}

// ── MIS INVITACIONES (vista guía) ────────────────────────────────────────────
function buildMisInvitaciones(){
  // exclude pendientes where event is already confirmed (accepted via email)
  const pendientes = S.invitaciones.filter(i=>{
    if(i.estado!=='PENDIENTE') return false;
    const ev = S.eventos.find(e=>e.id===i.evento_id);
    // if event is confirmed with this guia, it means they already accepted via email
    if(ev?.estado==='CONFIRMADO' && ev?.guia_id===i.guia_id) return false;
    // if event is confirmed with someone else, show as TOMADA_POR_OTRO
    return true;
  });
  // fix display: show accepted-via-email as ACEPTADA in historial
  const pasadas = S.invitaciones.filter(i=>{
    if(i.estado!=='PENDIENTE') return true;
    const ev = S.eventos.find(e=>e.id===i.evento_id);
    // confirmed with this guia = accepted via email, show in historial
    return ev?.estado==='CONFIRMADO' && ev?.guia_id===i.guia_id;
  }).map(i=>{
    const ev = S.eventos.find(e=>e.id===i.evento_id);
    if(i.estado==='PENDIENTE' && ev?.estado==='CONFIRMADO' && ev?.guia_id===i.guia_id){
      return {...i, estado:'ACEPTADA'};
    }
    return i;
  });
  return `
  <div style="padding:24px;display:flex;flex-direction:column;gap:16px;max-width:700px">
    ${pendientes.length===0?'':`
    <div>
      <div style="font-size:12px;font-weight:700;color:#D97706;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px">⏳ Pendientes de respuesta (${pendientes.length})</div>

          return `

// ── MODALS ────────────────────────────────────────────────────────────────────
function buildModal(){
  const m=S.modal;
  
  // Generic modal with title + content
  if(m.title && m.content) return buildGenericModal(m.title, m.content);
  
  if(m.type==='guia-form')    return buildGuiaModal(m.entry);
  if(m.type==='viaje-form')   return buildViajeModal(m.entry);
  if(m.type==='evento-en-viaje') return buildEventoEnViajeModal(m.fileId);
  if(m.type==='evento-form')  return buildEventoModal(m.entry);
  if(m.type==='descargar-agenda') return buildDescargarAgendaModal();
  if(m.type==='invitar')      return buildInvitarModal(m.eventoId);
  if(m.type==='invitar-viaje') return buildInvitarViajeModal(m.fileId);
  if(m.type==='register')     return buildRegModal();
  if(m.type==='usuario-form')    return buildUsuarioModal(m.entry);
  if(m.type==='import-preview')  return buildImportPreviewModal(m.entity, m.rows, m.file);
  if(m.type==='calendario-guia')   return buildCalendarioGuiaModal(m.guiaId);
  if(m.type==='feedback')          return buildFeedbackModal(m.eventoId);
  if(m.type==='liquidar-viaje')     return buildLiquidarViajeModal(m.fileId, m.evsSinLiq, m.valorHora);
  if(m.type==='nueva-liq')         return buildNuevaLiquidacionModal(m.eventoId);
  if(m.type==='ver-liq')           return buildVerLiquidacionModal(m.liqId);
  if(m.type==='config-sla')        return buildSLAModal();
  if(m.type==='wp-agenda')          return buildWPAgendaModal(m.guiaId);
  if(m.type==='transportista-form') return buildTransportistaModal(m.entry||{});
  if(m.type==='enviar-calendario')  return buildEnviarCalendarioModal(m.transportistaId);
  return '';
}

function buildInvitarModal(eventoId){
  const evento=S.eventos.find(e=>e.id===eventoId);
  const guiasActivos=[...S.guias].filter(g=>g.estado==='ACTIVO').sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const invExistentes=S.invitaciones.filter(i=>i.evento_id===eventoId&&['PENDIENTE','ACEPTADA'].includes(i.estado)).map(i=>i.guia_id);
  return `
  <div id="modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="background:#1A1A1A;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,0.25);animation:slideIn 0.2s ease">
      <div style="background:${T.tealMid};padding:20px 28px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="color:rgba(255,255,255,0.7);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">Invitar guías</div>
          <div style="color:white;font-size:18px;font-weight:700;font-family:'Playfair Display',serif">${esc(evento?.tipo_evento)} · ${evento?.fecha}</div>
        </div>
        <button id="btn-close-modal" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;color:white;font-size:20px;width:36px;height:36px;cursor:pointer">×</button>
      </div>
      <div style="padding:24px;display:flex;flex-direction:column;gap:16px">
        <div style="background:#1F1A0D;border-radius:8px;padding:12px 16px;font-size:13px;color:#D97706">
          ⏱ SLA: <strong>${SLA[evento?.prioridad]} horas</strong> para responder · El primero que acepte queda confirmado
        </div>
        <div style="font-size:12px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em">Seleccioná guías a invitar</div>
        <div style="display:flex;flex-direction:column;gap:8px;max-height:300px;overflow:auto">
          ${guiasActivos.map(g=>{
            const yaInvitado=invExistentes.includes(g.id);
            const eventosEseDia=S.eventos.filter(e=>e.guia_id===g.id&&e.fecha===evento?.fecha&&e.id!==eventoId&&['CONFIRMADO','ASIGNADO'].includes(e.estado));
            const bloqueo=S.bloqueos.find(b=>b.guia_id===g.id&&b.fecha===evento?.fecha);
            const noDisponible=eventosEseDia.length>0||!!bloqueo;
            const noDispLabel=bloqueo?('Bloqueado'+(bloqueo.motivo?' · '+bloqueo.motivo:'')):eventosEseDia.map(e=>e.hora_inicio+(e.hora_fin?' - '+e.hora_fin:'')).join(', ');
            const disabled=yaInvitado||noDisponible;
            const borderColor=noDisponible?'#fcd5d5':'#E8E4DD';
            const bgColor=noDisponible?'#fff8f8':'white';
            const avatarBg=noDisponible?'#fcd5d520':T.teal+'20';
            const avatarFg=noDisponible?'#E63946':T.teal;
            return '<label style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;border:1.5px solid '+borderColor+';cursor:'+(disabled?'not-allowed':'pointer')+';opacity:'+(disabled?0.6:1)+';background:'+bgColor+'" '+(disabled?'':' onmouseenter="this.style.borderColor=\'#2A9D8F\'" onmouseleave="this.style.borderColor=\'#E8E4DD\'"')+'>'
              +'<input type="checkbox" value="'+g.id+'" '+(disabled?'disabled ':'')+' '+(yaInvitado?'checked':'')+' style="width:16px;height:16px;accent-color:'+T.tealMid+';cursor:pointer"/>'
              +'<div style="width:34px;height:34px;border-radius:50%;background:'+avatarBg+';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:'+avatarFg+';flex-shrink:0">'+esc(g.nombre[0])+'</div>'
              +'<div style="flex:1">'
                +'<div style="font-size:13px;font-weight:600;color:'+T.dark+'">'+esc(g.nombre)+' '+esc(g.apellido)+'</div>'
                +'<div style="font-size:11px;color:#6B7280">'+(isAdmin()?g.tipo+' · $'+g.valor_hora+'/h · ':'')+esc(g.email)+'</div>'
                +(noDisponible?'<div style="font-size:11px;color:#E63946;font-weight:600;margin-top:2px">⛔ No disponible · '+noDispLabel+'</div>':'')
              +'</div>'
              +(yaInvitado?'<span style="font-size:10px;background:#0D2010;color:#4ADE80;padding:2px 8px;border-radius:10px;font-weight:600">Ya invitado</span>':'')
              +'</label>';
          }).join('')}
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button id="btn-close-modal2" style="${btnS}">Cancelar</button>
          <button id="btn-enviar-invitaciones" data-evento-id="${eventoId}" style="${btnP(T.tealMid)}box-shadow:0 4px 14px ${T.tealMid}50">📧 Enviar invitaciones</button>
        </div>
      </div>
    </div>
  </div>`;
}

function buildInvitarViajeModal(fileId){
  const file = S.files.find(f=>f.id===fileId);
  const eventosViaje = S.eventos.filter(e=>e.file_id===fileId && e.estado!=='CANCELADO')
    .sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const guiasActivos = [...S.guias].filter(g=>g.estado==='ACTIVO').sort((a,b)=>a.nombre.localeCompare(b.nombre));

  if(!eventosViaje.length){
    return `<div id="modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px">
      <div style="background:#1A1A1A;border-radius:16px;padding:36px;max-width:420px;text-align:center">
        <div style="font-size:32px;margin-bottom:12px">📋</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:8px">No hay eventos en este viaje</div>
        <button id="btn-close-modal" style="${btnS}margin-top:12px">Cerrar</button>
      </div>
    </div>`;
  }

  const eventosListHtml = eventosViaje.map(e=>{
    const fechaStr = new Date(e.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'short',day:'2-digit',month:'short'});
    const estadoC = ESTADO_EVENT_COLOR[e.estado]||{};
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#F9F8F6;border-radius:7px;margin-bottom:5px">
      <div>
        <div style="font-size:12px;font-weight:700;color:#F9FAFB">${esc(e.tipo_evento)}</div>
        <div style="font-size:11px;color:#6B7280">${fechaStr} · ${e.hora_inicio||'—'}${e.hora_fin?' – '+e.hora_fin:''}</div>
      </div>
      <span style="font-size:10px;background:${estadoC.bg||'#eee'};color:${estadoC.fg||'#555'};padding:2px 8px;border-radius:10px;font-weight:600">${estadoC.label||e.estado}</span>
    </div>`;
  }).join('');

  const guiasHtml = guiasActivos.map(g=>{
    // Verificar si tiene conflictos en alguna fecha del viaje
    const conflictos = eventosViaje.filter(e=>{
      const ev=S.eventos.find(x=>x.guia_id===g.id&&x.fecha===e.fecha&&x.id!==e.id&&['CONFIRMADO','ASIGNADO'].includes(x.estado));
      const bloq=S.bloqueos.find(b=>b.guia_id===g.id&&b.fecha===e.fecha);
      return ev||bloq;
    });
    const disabled = conflictos.length>0;
    const conflictoLabel = disabled ? `⛔ Conflicto en ${conflictos.length} fecha(s)` : '';
    return '<label style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;border:1.5px solid '+(disabled?'#fcd5d5':'#E8E4DD')+';cursor:'+(disabled?'not-allowed':'pointer')+';opacity:'+(disabled?0.6:1)+';background:'+(disabled?'#fff8f8':'white')+'" '+(disabled?'':' onmouseenter="this.style.borderColor=\'#2A9D8F\'" onmouseleave="this.style.borderColor=\'#E8E4DD\'"')+'>'
      +'<input type="checkbox" value="'+g.id+'" '+(disabled?'disabled':'')+' style="width:16px;height:16px;accent-color:'+T.tealMid+';cursor:pointer"/>'
      +'<div style="width:34px;height:34px;border-radius:50%;background:'+(disabled?'#fcd5d520':T.teal+'20')+';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:'+(disabled?'#E63946':T.teal)+';flex-shrink:0">'+esc(g.nombre[0])+'</div>'
      +'<div style="flex:1">'
        +'<div style="font-size:13px;font-weight:600;color:'+T.dark+'">'+esc(g.nombre)+' '+esc(g.apellido)+'</div>'
        +'<div style="font-size:11px;color:#6B7280">'+esc(g.email)+'</div>'
        +(disabled?'<div style="font-size:11px;color:#E63946;font-weight:600;margin-top:2px">'+conflictoLabel+'</div>':'')
      +'</div>'
      +'</label>';
  }).join('');

  return `
  <div id="modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="background:#1A1A1A;border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,0.25);animation:slideIn 0.2s ease">
      <div style="background:linear-gradient(135deg,#1A3A2A,#2A5A3A);padding:20px 28px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="color:rgba(255,255,255,0.7);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">Invitar guías al viaje completo</div>
          <div style="color:white;font-size:18px;font-weight:700;font-family:'Playfair Display',serif">📁 File ${esc(file?.nro_file||'')}</div>
        </div>
        <button id="btn-close-modal" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;color:white;font-size:20px;width:36px;height:36px;cursor:pointer">×</button>
      </div>
      <div style="padding:24px;display:flex;flex-direction:column;gap:16px">
        <div style="background:#FFF9E6;border:1.5px solid #E9C46A;border-radius:8px;padding:12px 16px;font-size:13px;color:#D97706">
          ⚠️ <strong>El guía debe aceptar todos los eventos del viaje.</strong> Si rechaza, queda fuera de todos. No se puede aceptar solo algunos.
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Eventos incluidos (${eventosViaje.length})</div>
          <div style="max-height:180px;overflow:auto">${eventosListHtml}</div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Seleccioná guías a invitar</div>
          <div style="display:flex;flex-direction:column;gap:6px;max-height:240px;overflow:auto">${guiasHtml}</div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button id="btn-close-modal2" style="${btnS}">Cancelar</button>
          <button id="btn-enviar-invitaciones-viaje" data-file-id="${fileId}" style="${btnP(T.tealMid)}box-shadow:0 4px 14px ${T.tealMid}50">📧 Enviar invitación al viaje</button>
        </div>
      </div>
    </div>
  </div>`;
}

function buildCalendarioGuiaModal(guiaId){
  const guia = S.guias.find(g=>g.id===guiaId);
  if(!guia) return '';
  const misEventos = S.eventos
    .filter(e=>e.guia_id===guiaId && e.estado!=='CANCELADO')
    .sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

  // build mini calendar — current + next month
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();

  const eventDates = new Set(misEventos.map(e=>e.fecha));

  function buildMiniMonth(y, m){
    const monthName = new Date(y,m,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});
    const firstDay = new Date(y,m,1).getDay();
    const daysInMonth = new Date(y,m+1,0).getDate();
    const offset = firstDay===0?6:firstDay-1; // monday first
    let cells = '';
    for(let i=0;i<offset;i++) cells+=`<div></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const hasEvent = eventDates.has(dateStr);
      const isToday = dateStr===today.toISOString().slice(0,10);
      cells+=`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;font-weight:${hasEvent?700:400};background:${hasEvent?T.teal:isToday?T.teal+'20':'transparent'};color:${hasEvent?'white':isToday?T.teal:'#1A1A1A'};position:relative">
        ${d}
        ${hasEvent?`<span style="position:absolute;bottom:1px;width:4px;height:4px;border-radius:50%;background:${T.coral}"></span>`:''}
      </div>`;
    }
    return `<div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:#F9FAFB;text-transform:capitalize;margin-bottom:10px;text-align:center">${monthName}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">
        ${['Lu','Ma','Mi','Ju','Vi','Sa','Do'].map(d=>`<div style="font-size:10px;font-weight:700;color:#6B7280;padding:4px 0">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>`;
  }

  return `
  <div id="modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="background:#1A1A1A;border-radius:16px;width:100%;max-width:620px;max-height:90vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,0.25);animation:slideIn 0.2s ease">
      <div style="background:linear-gradient(135deg,${T.teal},${T.tealMid});padding:20px 28px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="color:rgba(255,255,255,0.7);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">Calendario del guía</div>
          <div style="color:white;font-size:18px;font-weight:700">${esc(guia.nombre)} ${esc(guia.apellido)}</div>
          <div style="color:rgba(255,255,255,0.6);font-size:12px;margin-top:2px">${guia.tipo} · ${misEventos.length} evento(s) confirmado(s)</div>
        </div>
        <button id="btn-close-modal" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;color:white;font-size:20px;width:36px;height:36px;cursor:pointer">×</button>
      </div>
      <div style="padding:24px;display:flex;flex-direction:column;gap:20px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          ${buildMiniMonth(year, month)}
          ${buildMiniMonth(year, month+1 > 11 ? 0 : month+1)}
        </div>
        ${misEventos.length===0?`<div style="text-align:center;padding:20px;color:#6B7280">Sin eventos confirmados</div>`:`
        <div>
          <div style="font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">Próximos eventos</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${misEventos.map(e=>{
              const fecha = new Date(e.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'short',day:'2-digit',month:'short'});
              const past = new Date(e.fecha) < today;
              return `<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;background:${past?'#F5F3EF':'white'};border:1.5px solid ${past?'#E8E4DD':T.teal+'40'}">
                <div style="width:42px;text-align:center;flex-shrink:0">
                  <div style="font-size:18px;font-weight:700;color:${past?'#9E9A93':T.teal};line-height:1">${new Date(e.fecha+'T12:00:00').getDate()}</div>
                  <div style="font-size:10px;color:#6B7280;text-transform:uppercase">${new Date(e.fecha+'T12:00:00').toLocaleDateString('es-AR',{month:'short'})}</div>
                </div>
                <div style="flex:1">
                  <div style="font-size:13px;font-weight:600;color:${past?'#9E9A93':'#1A1A1A'}">${esc(e.tipo_evento)}</div>
                  <div style="font-size:11px;color:#6B7280">${e.hora_inicio}${e.hora_fin?' - '+e.hora_fin:''}${e.nro_file?' · 📁 '+esc(e.nro_file):''}</div>
                </div>
                <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:${past?'#E8E4DD':'#D4EDDA'};color:${past?'#9E9A93':'#155724'}">${past?'Realizado':'Confirmado'}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`}
      </div>
    </div>
  </div>`;
}

function attachEvents(){
  // ── MOBILE EVENTS ─────────────────────────────────────────────────────────
  if(isMobile() && S.role==='guia'){
    // bottom nav tabs
    document.querySelectorAll('[data-mobile-tab]').forEach(btn=>btn.addEventListener('click',()=>{
      mobileView = btn.dataset.mobileTab;
      mobileEventoDetalle = null;
      render();
    }));
    // detalle from any list
    document.querySelectorAll('[data-mobile-detalle]').forEach(el=>el.addEventListener('click',()=>{
      mobileEventoDetalle = parseInt(el.dataset.mobileDetalle);
      mobileView = 'detalle';
      render();
    }));
    // back button
    document.getElementById('btn-mobile-back')?.addEventListener('click',()=>{
      mobileView = 'calendario';
      mobileEventoDetalle = null;
      render();
    });
    // logout
    document.getElementById('btn-mobile-logout')?.addEventListener('click',async()=>{
      await db.auth.signOut(); set({user:null,role:null,myGuia:null});
    });
    // invitaciones aceptar/rechazar
    document.querySelectorAll('[data-mobile-inv-aceptar]').forEach(btn=>btn.addEventListener('click', async()=>{
      const invId = parseInt(btn.dataset.mobileInvAceptar);
      btn.textContent='...'; btn.disabled=true;
      const {data:inv} = await db.from('invitaciones').select('*').eq('id',invId).single();
      if(!inv){toast('Error',T.red);return;}
      const {data:evento} = await db.from('eventos').select('*').eq('id',inv.evento_id).single();
      if(evento?.estado==='CONFIRMADO'&&evento?.guia_id!==inv.guia_id){
        await db.from('invitaciones').update({estado:'TOMADA_POR_OTRO',respondido_at:new Date().toISOString()}).eq('id',inv.id);
        toast('Este evento ya fue tomado',T.red); await loadAll(); return;
      }
      await db.from('invitaciones').update({estado:'ACEPTADA',respondido_at:new Date().toISOString()}).eq('id',inv.id);
      await db.from('eventos').update({estado:'CONFIRMADO',guia_id:inv.guia_id}).eq('id',inv.evento_id);
      const {data:otras} = await db.from('invitaciones').select('*').eq('evento_id',inv.evento_id).eq('estado','PENDIENTE').neq('id',inv.id);
      for(const otra of (otras||[])){
        await db.from('invitaciones').update({estado:'TOMADA_POR_OTRO',respondido_at:new Date().toISOString()}).eq('id',otra.id);
      }
      await db.from('historial').insert({evento_id:inv.evento_id,guia_id:inv.guia_id,invitacion_id:inv.id,accion:'ACEPTADA',actor:'GUIA',detalle:'Aceptado desde app movil'});
      toast('Confirmado!',T.green); await loadAll();
    }));
    document.querySelectorAll('[data-mobile-inv-rechazar]').forEach(btn=>btn.addEventListener('click', async()=>{
      const invId = parseInt(btn.dataset.mobileInvRechazar);
      btn.textContent='...'; btn.disabled=true;
      const {data:inv} = await db.from('invitaciones').select('*').eq('id',invId).single();
      if(!inv){toast('Error',T.red);return;}
      await db.from('invitaciones').update({estado:'RECHAZADA',respondido_at:new Date().toISOString()}).eq('id',inv.id);
      await db.from('historial').insert({evento_id:inv.evento_id,guia_id:inv.guia_id,invitacion_id:inv.id,accion:'RECHAZADA',actor:'GUIA',detalle:'Rechazado desde app movil'});
      const {data:pendAun} = await db.from('invitaciones').select('id').eq('evento_id',inv.evento_id).eq('estado','PENDIENTE');
      if(!pendAun?.length) await db.from('eventos').update({estado:'A_ASIGNAR'}).eq('id',inv.evento_id);
      toast('Registrado',T.coral); await loadAll();
    }));
    // guardar feedback
    document.querySelectorAll('[data-mobile-guardar-feedback]').forEach(btn=>btn.addEventListener('click', async()=>{
      const eventoId = parseInt(btn.dataset.mobileGuardarFeedback);
      const txt = document.getElementById('mobile-feedback-txt')?.value?.trim();
      if(!txt){toast('Escribi algo primero',T.red);return;}
      btn.textContent='Guardando...'; btn.disabled=true;
      await db.from('eventos').update({feedback_texto:txt,feedback_at:new Date().toISOString()}).eq('id',eventoId);
      toast('Feedback guardado!',T.green); await loadAll();
    }));
    // guardar liquidacion
    document.querySelectorAll('[data-mobile-guardar-liq]').forEach(btn=>btn.addEventListener('click', async()=>{
      const eventoId = parseInt(btn.dataset.mobileGuardarLiq);
      const horas = parseFloat(document.getElementById('mobile-liq-horas')?.value||0);
      const valor = parseFloat(document.getElementById('mobile-liq-valor')?.value||0);
      const gastos = parseFloat(document.getElementById('mobile-liq-gastos')?.value||0);
      const obs = document.getElementById('mobile-liq-obs')?.value?.trim()||'';
      if(!horas){toast('Ingresa las horas',T.red);return;}
      const total = (horas*valor)+gastos;
      btn.textContent='Enviando...'; btn.disabled=true;
      await db.from('liquidaciones').insert({evento_id:eventoId,guia_id:S.myGuia.id,horas,valor_hora:valor,gastos_extras:gastos||null,observaciones:obs||null,total,estado:'PENDIENTE'});
      toast('Liquidacion enviada!',T.green); await loadAll();
    }));
    // calendario nav
    document.getElementById('cal-prev')?.addEventListener('click',()=>{const d=new Date(S.calMonth);d.setMonth(d.getMonth()-1);set({calMonth:d});});
    document.getElementById('cal-next')?.addEventListener('click',()=>{const d=new Date(S.calMonth);d.setMonth(d.getMonth()+1);set({calMonth:d});});
    // disponibilidad toggle
    document.querySelectorAll('[data-dispo-day]').forEach(el=>{
      el.addEventListener('click',()=>{
        const dateStr=el.dataset.dispoDay;
        if(new Date(dateStr+'T12:00:00')<new Date(new Date().toDateString())) return;
        if(el.dataset.bloqueado==='1'){toggleBloqueo(dateStr,parseInt(el.dataset.bloqueoId),'');return;}
        if(dispoSeleccion.has(dateStr)) dispoSeleccion.delete(dateStr);
        else dispoSeleccion.add(dateStr);
        render();
      });
    });
    // Foto guia: handled inline via onchange on the input element
  // GCal sync all confirmed events
  document.getElementById('btn-gcal-sync-all')?.addEventListener('click', async()=>{
    const btn = document.getElementById('btn-gcal-sync-all');
    if(!S.myGuia?.google_refresh_token){ toast('Primero conectá Google Calendar', T.red); return; }
    btn.textContent='⟳ Sincronizando...'; btn.disabled=true;
    const confirmados = S.eventos.filter(e=>e.estado==='CONFIRMADO' && e.guia_id===S.myGuia.id);

    const file = e.target.files?.[0]; if(!file) return;
    const status = document.getElementById('import-eventos-status');
    status.innerHTML = '⟳ Procesando...';
    try {
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data);
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      // Normalize columns
      const eventosToImport = rows.map(r=>({
        tipo_evento:     String(r.tipo_evento||r['Tipo Evento']||r['tipo evento']||'').trim(),
        fecha:           String(r.fecha||r['Fecha']||'').trim(),
        hora_inicio:     String(r.hora_inicio||r['Hora Inicio']||r['hora inicio']||'').trim()||null,
        hora_fin:        String(r.hora_fin||r['Hora Fin']||r['hora fin']||'').trim()||null,
        descripcion:     String(r.descripcion||r['Descripcion']||'').trim()||null,
        pickup_location: String(r.pickup_location||r['Pick Up']||r['pickup']||'').trim()||null,
        dropoff_location:String(r.dropoff_location||r['Drop Off']||r['dropoff']||'').trim()||null,
        datos_vuelos:    String(r.datos_vuelos||r['Vuelos']||r['vuelos']||'').trim()||null,
        link_adjunto:    String(r.link_adjunto||r['Link']||'').trim()||null,
        prioridad:       String(r.prioridad||r['Prioridad']||'REGULAR').trim(),
        nro_file:        String(r.nro_file||r['Nro File']||r['nro file']||'').trim()||null,
        estado:          'A_ASIGNAR',
      })).filter(r=>r.tipo_evento && r.fecha);

      if(!eventosToImport.length){ status.innerHTML='⚠️ No se encontraron filas válidas (verificá que tenga columnas tipo_evento y fecha)'; return; }

      // Cargar eventos existentes para detectar duplicados
      const {data:existentes} = await db.from('eventos').select('tipo_evento,fecha,file_id');
      const existSet = new Set((existentes||[]).map(e=>`${e.tipo_evento}|${e.fecha}|${e.file_id||''}`));

      let insertados=0, duplicados=0, errores=0;
      for(const ev of eventosToImport){
        // Buscar file_id por nro_file si viene
        let file_id = null;
        if(ev.nro_file){
          const f = S.files.find(f=>(f.nro_file||'').toLowerCase()===ev.nro_file.toLowerCase());
          if(f) file_id = f.id;
        }
        const key = `${ev.tipo_evento}|${ev.fecha}|${file_id||''}`;
        if(existSet.has(key)){ duplicados++; continue; }
        const {error} = await db.from('eventos').insert({...ev, file_id, nro_file:undefined});
        if(error){ errores++; console.error(error); }
        else { insertados++; existSet.add(key); }
      }
      status.innerHTML = `✅ <strong>${insertados}</strong> importados · <strong>${duplicados}</strong> duplicados omitidos${errores?` · <span style="color:#E63946">${errores} errores</span>`:''}`;
      await loadAll();
    } catch(err){
      status.innerHTML = `❌ Error: ${err.message}`;
    }
    e.target.value='';
  });

  const btnPreviewWP = document.getElementById('btn-preview-wp');

  function buildWPText(){
    const guiaId = btnSendWP ? parseInt(btnSendWP.dataset.guiaId) : null;
    const g = S.guias.find(x=>x.id===guiaId);
    const desde = document.getElementById('wp-desde')?.value;
    const hasta  = document.getElementById('wp-hasta')?.value;
    if(!g||!desde||!hasta) return null;

    const evs = S.eventos
      .filter(e=>e.guia_id===g.id && e.estado==='CONFIRMADO' && e.fecha>=desde && e.fecha<=hasta)
      .sort((a,b)=>a.fecha.localeCompare(b.fecha));

    const fmtFecha = f => new Date(f+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long'});

    let msg = 'Hola '+g.nombre+'! Aca va tu agenda de eventos';
    if(desde===hasta) msg += ' para el '+fmtFecha(desde);
    else msg += ' del '+fmtFecha(desde)+' al '+fmtFecha(hasta);
    msg += ':\n\n';

    if(!evs.length){
      msg += 'No tenes eventos confirmados en ese periodo.';
    } else {
      evs.forEach((e,i)=>{
        msg += (i+1)+'. '+fmtFecha(e.fecha)+'\n';
        msg += '   Tipo: '+e.tipo_evento;
        if(e.nro_file)    msg += ' / '+e.nro_file;
        if(e.hora_inicio) msg += '\n   Horario: '+e.hora_inicio.slice(0,5)+(e.hora_fin?' - '+e.hora_fin.slice(0,5):'');
        if(e.descripcion) msg += '\n   '+e.descripcion;
        msg += '\n\n';
      });
    }
    msg += 'Cualquier consulta escribinos. Gracias!\n- Say Hueque';
    return {msg, g, evs};
  }

// ── EXPORT ───────────────────────────────────────────────────────────────────
function exportGuias(){
  const rows = [['nombre','apellido','email','telefono','valor_hora','tipo','estado','categoria','prioridad_guia','idiomas','formacion','ente','notas']];
  S.guias.forEach(g => rows.push([g.nombre,g.apellido,g.email,g.telefono||'',g.valor_hora||'',g.tipo,g.estado,g.categoria||'',g.prioridad_guia||'',(g.idiomas||[]).join('|'),g.formacion||'',g.ente||'',g.notas||'']));
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Guías');
  XLSX.writeFile(wb, 'guias_sayhueque.xlsx');
  toast('✅ Exportado correctamente');
}

function exportEventos(){
  const rows = [['tipo_evento','fecha','hora_inicio','hora_fin','prioridad','estado','descripcion','link_adjunto']];
  S.eventos.forEach(e => rows.push([e.tipo_evento,e.fecha,e.hora_inicio,e.hora_fin||'',e.prioridad,e.estado,e.descripcion||'',e.link_adjunto||'']));
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Eventos');
  XLSX.writeFile(wb, 'eventos_sayhueque.xlsx');
  toast('✅ Exportado correctamente');
}

// ── IMPORT ────────────────────────────────────────────────────────────────────
async function importGuias(file){
  const data = await file.arrayBuffer();
  const wb = XLSX.read(data, {cellDates: true});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw: false});

  if(!rows.length){ toast('El archivo está vacío', T.red); return; }

  // show preview modal
  set({modal:{type:'import-preview', entity:'guias', rows, file: file.name}});
}

async function importEventos(file){
  const data = await file.arrayBuffer();
  const wb = XLSX.read(data, {cellDates: true});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw: false, dateNF: 'yyyy-mm-dd'});

  if(!rows.length){ toast('El archivo está vacío', T.red); return; }

  // normalize dates: could be Date object, serial number, or string
  rows.forEach(r => {
    const key = Object.keys(r).find(k => k.toLowerCase().includes('fecha'));
    if(!key) return;
    const val = r[key];
    if(val instanceof Date){
      r[key] = val.toISOString().slice(0,10);
    } else if(typeof val === 'number'){
      // Excel serial date
      const d = new Date(Math.round((val - 25569) * 86400 * 1000));
      r[key] = d.toISOString().slice(0,10);
    } else if(typeof val === 'string' && val.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)){
      // dd/mm/yyyy
      const [d,m,y] = val.split('/');
      r[key] = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    // already yyyy-mm-dd -> keep as is
  });

  set({modal:{type:'import-preview', entity:'eventos', rows, file: file.name}});
}

async function doImportGuias(rows){
  let ok=0, errors=[];
  for(const r of rows){
    const idiomasRaw = String(r.idiomas||r.Idiomas||'').trim();
    const guia = {
      nombre:       String(r.nombre||r.Nombre||'').trim(),
      apellido:     String(r.apellido||r.Apellido||'').trim(),
      email:        String(r.email||r.Email||'').trim().toLowerCase(),
      telefono:     String(r.telefono||r.Telefono||'').trim()||null,
      valor_hora:   parseFloat(r.valor_hora||r['Valor hora']||r.ValorHora||0)||null,
      tipo:         String(r.tipo||r.Tipo||'JUNIOR').toUpperCase().trim(),
      estado:       String(r.estado||r.Estado||'ACTIVO').toUpperCase().trim(),
      categoria:    String(r.categoria||r.Categoria||'').trim()||null,
      prioridad_guia: String(r.prioridad_guia||r['Prioridad']||'').trim()||null,
      idiomas:      idiomasRaw ? idiomasRaw.split('|').map(s=>s.trim()).filter(Boolean) : [],
      formacion:    String(r.formacion||r.Formacion||'').trim()||null,
      ente:         String(r.ente||r.Ente||'').trim()||null,
      notas:        String(r.notas||r.Notas||'').trim()||null,
    };
    if(!guia.nombre||!guia.apellido||!guia.email){ errors.push(`Fila sin nombre/apellido/email`); continue; }
    if(!['SENIOR','JUNIOR'].includes(guia.tipo)) guia.tipo='JUNIOR';
    if(!['ACTIVO','INACTIVO'].includes(guia.estado)) guia.estado='ACTIVO';

    const {error} = await db.from('guias').upsert(guia, {onConflict:'email',ignoreDuplicates:false});
    if(error) errors.push(`${guia.email}: ${error.message}`);
    else ok++;
  }
  await loadAll();
  set({modal:null});
  if(errors.length) toast(`✅ ${ok} importados, ⚠️ ${errors.length} errores`, T.amber);
  else toast(`✅ ${ok} guías importados correctamente`);
}

async function doImportEventos(rows){
  let ok=0, errors=[];
  for(const r of rows){
    const evento = {
      tipo_evento:  String(r.tipo_evento||r['Tipo evento']||r.TipoEvento||'').trim(),
      fecha:        String(r.fecha||r.Fecha||'').trim(),
      hora_inicio:  String(r.hora_inicio||r['Hora inicio']||r.HoraInicio||'').trim(),
      hora_fin:     String(r.hora_fin||r['Hora fin']||r.HoraFin||'').trim()||null,
      prioridad:    String(r.prioridad||r.Prioridad||'REGULAR').toUpperCase().trim(),
      descripcion:  String(r.descripcion||r.Descripcion||r.Descripción||'').trim()||null,
      link_adjunto: String(r.link_adjunto||r['Link adjunto']||'').trim()||null,
      estado:       'A_ASIGNAR',
    };
    if(!evento.tipo_evento||!evento.fecha||!evento.hora_inicio){ errors.push(`Fila sin tipo/fecha/hora`); continue; }
    if(!['URGENTE','REGULAR'].includes(evento.prioridad)) evento.prioridad='REGULAR';

    const {error} = await db.from('eventos').insert(evento);
    if(error) errors.push(`${evento.tipo_evento} ${evento.fecha}: ${error.message}`);
    else ok++;
  }
  await loadAll();
  set({modal:null});
  if(errors.length) toast(`✅ ${ok} importados, ⚠️ ${errors.length} errores`, T.amber);
  else toast(`✅ ${ok} eventos importados correctamente`);
}

              style="padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:white;font-size:11px;cursor:pointer;color:#E76F51;font-weight:600;font-family:'DM Sans',sans-serif">
              🔒 Reset pass
            </button>
            <button onclick="editUsuario('${r.user_id}','${r.role}',${r.guia_id||'null'},'${displayEmail}')"
              style="padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:white;font-size:11px;cursor:pointer;color:#1B6B74;font-weight:600;font-family:'DM Sans',sans-serif">
              ✏️ Editar
            </button>
            ${r.user_id !== S.user?.id ? `<button onclick="darDeBajaUsuario('${r.user_id}','${displayName}')"
              style="padding:6px 12px;border-radius:6px;border:1px solid #fcd5d5;background:#1E1E1E5f5;font-size:11px;cursor:pointer;color:#E63946;font-weight:600;font-family:'DM Sans',sans-serif">
              ✕ Baja
            </button>` : '<span style="font-size:10px;color:#6B7280;padding:6px 4px">(vos)</span>'}
          </div>
        </div>`;
      }).join('')}
    </div>`;

  // Attach event listener para guardar email de notificaciones
  document.getElementById('btn-save-email-notif')?.addEventListener('click', async()=>{
    const email = document.getElementById('email-notif-admin')?.value?.trim();
    if(!email){ toast('Ingresá un email válido', T.red); return; }
    await db.from('config').upsert({key:'email_notificaciones_admin', value:email}, {onConflict:'key'});
    toast('✅ Email de notificaciones guardado');
  });
}

async function resetPassword(userId, email){
  if(!email){ toast('No se encontró el email del usuario', '#E63946'); return; }
  if(!confirm(`¿Enviar email de reset de contraseña a ${email}?`)) return;
  const redirectTo = window.location.origin + window.location.pathname;
  const {error} = await db.auth.resetPasswordForEmail(email, {
    redirectTo: redirectTo,
  });
  if(error){ toast('Error: '+error.message, '#E63946'); return; }
  toast(`✅ Email de reset enviado a ${email}`);
}

async function darDeBajaUsuario(userId, nombre){
  if(!confirm(`¿Dar de baja a ${nombre}? Se eliminará su acceso al sistema.`)) return;
  const {error} = await db.from('user_roles').delete().eq('user_id', userId);
  if(error){ toast('Error: '+error.message, '#E63946'); return; }
  await db.from('historial').insert({
    accion: 'USUARIO_BAJA',
    actor: 'ADMIN',
    detalle: `Usuario ${nombre} dado de baja por ${S.user?.email}`
  });
  toast(`✅ ${nombre} dado de baja`);
  loadUsuariosPanel();
}

function editUsuario(userId, role, guiaId, email=''){
  set({modal:{type:'usuario-form', entry:{user_id:userId, role, guia_id:guiaId, email}}});
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function login(email, pass){
  const {data, error} = await db.auth.signInWithPassword({email, password: pass});
  if(error){
    toast('❌ ' + (error.message.includes('Invalid') ? 'Email o contraseña incorrectos' : error.message), T.red);
    return false;
  }
  set({user: data.user, loading: false});
  await loadRole();
  await loadAll();
  return true;
}

async function logout(){
  await db.auth.signOut();
  set({user:null, role:null, myGuia:null, guias:[], eventos:[], invitaciones:[], historial:[], liquidaciones:[], transportistas:[], files:[], bloqueos:[]});
}

async function register(email, pass){
  const {data, error} = await db.auth.signUp({email, password: pass});
  if(error){ toast('Error: '+error.message, T.red); return; }
  toast('✅ Usuario creado. Revisá tu email para confirmar.', T.tealMid);
  set({modal:null});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  // check recovery hash FIRST before anything else
  if(window.location.hash.includes('type=recovery')){
    set({loading:false, view:'password-reset'});
    render();
    return;
  }

  // Capturar params ANTES de render(): attachEvents() hace replaceState() sincrónicamente
  // y después de render() la URL ya está limpia — params.get(token) sería null.
  const initParams=new URLSearchParams(window.location.search);
  render();
  // Handle Google Calendar OAuth callback result
  if(initParams.get('gcal')==='success'){
    // Reload cleanly so fresh token loads into state properly
    window.location.replace(APP_URL + '?gcal_ok=1');
    return;
  }
  if(initParams.get('gcal_ok')==='1'){
    window.history.replaceState({}, '', APP_URL);
    // Toast will fire after loadAll below
  }
  if(initParams.get('gcal')==='error'){
    window.history.replaceState({}, '', APP_URL);
    setTimeout(()=>toast('❌ Error al conectar Google Calendar. Intentá de nuevo.', T.red), 500);
  }
  const calToken=initParams.get('confirmar_calendario');
  if(calToken){
    set({loading:false});
    await handleConfirmarCalendario(calToken);
    return;
  }
  // Si había token de invitación, attachEvents() ya lo procesa en background.
  // No seguir con auth flow — evita que set({loading:false}) re-renderice al login.
  if(initParams.get('token')){ return; }
  const {data:{session}}=await db.auth.getSession();
  if(session?.user){
    set({user:session.user,loading:false});
    await loadRole();
    await loadAll();
    // Google Calendar connected successfully
    if(initParams.get('gcal_ok')==='1'){
      window.history.replaceState({}, '', APP_URL);
      setTimeout(()=>toast('✅ ¡Google Calendar conectado! Tus eventos se sincronizarán automáticamente.', T.tealMid), 100);
    }
    // Deep link: ?evento=ID — navegar al evento después de que cargó todo
    const eventoDeepLink = initParams.get('evento');
    if(eventoDeepLink){
      window.history.replaceState({}, '', APP_URL); // limpiar URL
      set({view:'eventos', expandedEventId: parseInt(eventoDeepLink)});
      // Scroll al evento expandido después de que el DOM renderice
      setTimeout(()=>{
        const el = document.querySelector(`[data-toggle-evento="${eventoDeepLink}"]`);
        if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
      }, 300);
    }
  }
  else { set({loading:false}); }

  db.auth.onAuthStateChange((event, session)=>{
    if(event==='PASSWORD_RECOVERY') return; // ignore, handled above
    if(session?.user&&!S.user){set({user:session.user});loadRole().then(()=>loadAll());}
    else if(!session?.user&&S.user){set({user:null,role:null,myGuia:null,guias:[],eventos:[],invitaciones:[],historial:[]});}
  });

  // auto check SLA every 5 min
  // setInterval(checkSLA, 5*60*1000); // TODO: implement checkSLA function
}
init();
</script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW failed:', err));
      });
    }
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e;
      const btn = document.getElementById('btn-install-pwa');
      if(btn) btn.style.display = 'flex';
    });
    window.installPWA = async () => {
      if(!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      const btn = document.getElementById('btn-install-pwa');
      if(btn) btn.style.display = 'none';
    };
  </script>
</body>
