async function loadRole(){
  const {data:rows} = await db.from('user_roles').select('*');
  if(!rows?.length) return;
  const myRow = rows.find(r => r.user_id === S.user.id);
  if(!myRow) return;
  const role = myRow.role;
  let myGuia = null;
  if(role==='guia' && myRow.guia_id){
    const {data:g} = await db.from('guias').select('*').eq('id',myRow.guia_id).single();
    myGuia = g;
  }
  set({role, myGuia});
}

async function deleteSelectedEventos(){
  const ids = S.selectedEventos || [];
  if(!ids.length) return;
  if(!confirm(`¿Eliminar ${ids.length} evento(s)? Esta acción no se puede deshacer.`)) return;
  for(const id of ids){
    await db.from('historial').delete().eq('evento_id', id);
    await db.from('invitaciones').delete().eq('evento_id', id);
    await db.from('liquidaciones').delete().eq('evento_id', id);
    await db.from('cola_emails').delete().eq('evento_id', id);
    await db.from('eventos').delete().eq('id', id);
  }
  set({selectedEventos:[]});
  await loadSLAConfig();
  await loadAll();
  if(isAdmin()) checkAlertasAdmin();

  // Auto-refresh every 2 minutes
  setInterval(async()=>{
    await loadAll();
    if(isAdmin()) checkAlertasAdmin();
  }, 2 * 60 * 1000);
  toast(`🗑️ ${ids.length} evento(s) eliminado(s)`, T.red);
}

async function loadSLAConfig(){
  try {
    const {data} = await db.from('config').select('*').in('key',['sla_urgente','sla_regular']);
    if(data?.length){
      data.forEach(r=>{
        if(r.key==='sla_urgente') SLA.URGENTE = parseInt(r.value)||SLA.URGENTE;
        if(r.key==='sla_regular') SLA.REGULAR = parseInt(r.value)||SLA.REGULAR;
      });
    }
  } catch(e){ /* config table may not exist yet */ }
}

async function loadAll(){
  if(S.role==='guia' && S.myGuia){
    // guia only sees their own data
    // load invitaciones first to know which evento_ids the guia has
    const {data:invData} = await db.from('invitaciones').select('*').eq('guia_id',S.myGuia.id).order('created_at',{ascending:false});
    const invEventoIds = [...new Set((invData||[]).map(i=>i.evento_id))];
    
    const [e,h,l,tr] = await Promise.all([
      // load all eventos where guia is assigned OR has an invitation
      db.from('eventos').select('*').or(
        `guia_id.eq.${S.myGuia.id}${invEventoIds.length?',id.in.('+invEventoIds.join(',')+')'  :''}`
      ).order('fecha',{ascending:false}),
      db.from('historial').select('*').eq('guia_id',S.myGuia.id).order('created_at',{ascending:false}).limit(100),
      db.from('liquidaciones').select('*').eq('guia_id',S.myGuia.id).order('created_at',{ascending:false}),
      db.from('transportistas').select('*').order('nombre'),
    ]);
    set({ guias:[S.myGuia], eventos:e.data||[], invitaciones:invData||[], historial:h.data||[], liquidaciones:l.data||[], transportistas:tr.data||[] });
  } else {
    // admin sees everything
    const [g,e,i,h,l,tr] = await Promise.all([
      db.from('guias').select('*').order('nombre'),
      db.from('eventos').select('*').order('fecha',{ascending:false}),
      db.from('invitaciones').select('*').order('created_at',{ascending:false}),
      db.from('historial').select('*').order('created_at',{ascending:false}).limit(200),
      db.from('liquidaciones').select('*').order('created_at',{ascending:false}),
      db.from('transportistas').select('*').order('nombre'),
    ]);
    set({ guias:g.data||[], eventos:e.data||[], invitaciones:i.data||[], historial:h.data||[], liquidaciones:l.data||[], transportistas:tr.data||[] });
  }
}

async function sendCambioEmail(guia, evento, cambios){
  const fechaEvento = new Date(evento.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const horario = evento.hora_inicio + (evento.hora_fin ? ' - '+evento.hora_fin : '');
  try {
    await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE_CAMBIO, {
      to_email:     guia.email,
      guia_nombre:  guia.nombre + ' ' + guia.apellido,
      tipo_evento:  evento.tipo_evento,
      nro_file:     evento.nro_file || '—',
      fecha:        fechaEvento,
      horario:      horario,
      cambios:      cambios,
      descripcion:  evento.descripcion || '—',
      link_adjunto: evento.link_adjunto || '—',
    }, EMAILJS_KEY);
    console.log('Email cambio enviado a', guia.email);
  } catch(e){ console.error('EmailJS cambio error:', e); }
}

async function procesarColaEmails(){
  // only admin processes the queue
  if(!isAdmin()) return;
  
  const {data: pendientes} = await db
    .from('cola_emails')
    .select('*')
    .eq('enviado', false)
    .eq('tipo', 'RECORDATORIO');
  
  if(!pendientes?.length) return;
  
  for(const item of pendientes){
    const p = item.payload;
    try {
      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE_RECORDATORIO, {
        to_email:    p.to_email,
        guia_nombre: p.guia_nombre,
        tipo_evento: p.tipo_evento,
        fecha:       new Date(p.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
        horario:     p.horario,
        nro_file:    p.nro_file || '—',
        descripcion: p.descripcion || '—',
      }, EMAILJS_KEY);
      
      // mark as sent
      await db.from('cola_emails').update({enviado:true, enviado_at:new Date().toISOString()}).eq('id', item.id);
      console.log('Recordatorio enviado a', p.to_email);
    } catch(e){
      console.error('Error enviando recordatorio:', e);
    }
  }
}

async function saveGuia(data){
  let error;
  if(data.id){ const {id:_gid, ...guiaUpd} = data; ({error}=await db.from('guias').update(guiaUpd).eq('id',data.id)); }
  else        { ({error}=await db.from('guias').insert(data)); }
  if(error){toast('Error: '+error.message,T.red);return false;}
  await loadAll(); return true;
}

async function saveEvento(data){
  let error, result;
  if(data.id){
    // detect changes before saving
    const original = S.eventos.find(e=>e.id===data.id);
    const {id:_eid, ...dataToUpdate} = data;
    ({error}=await db.from('eventos').update(dataToUpdate).eq('id',data.id));
    if(!error && original?.estado==='CONFIRMADO' && original?.guia_id){
      // build list of changes
      const cambiosList = [];
      if(original.fecha !== data.fecha) cambiosList.push(`📅 Fecha: ${original.fecha} -> ${data.fecha}`);
      if(original.hora_inicio !== data.hora_inicio) cambiosList.push(`🕐 Hora inicio: ${original.hora_inicio} -> ${data.hora_inicio}`);
      if(original.hora_fin !== data.hora_fin) cambiosList.push(`🕑 Hora fin: ${original.hora_fin||'—'} -> ${data.hora_fin||'—'}`);
      if(original.descripcion !== data.descripcion) cambiosList.push(`📝 Descripción actualizada`);
      if(original.link_adjunto !== data.link_adjunto) cambiosList.push(`🔗 Adjunto actualizado`);
      if(original.tipo_evento !== data.tipo_evento) cambiosList.push(`📋 Tipo: ${original.tipo_evento} -> ${data.tipo_evento}`);
      if(cambiosList.length > 0){
        const guia = S.guias.find(g=>g.id===original.guia_id);
        if(guia?.email){
          sendCambioEmail(guia, data, cambiosList.join('<br/>'));
          toast('✉️ Guía notificado del cambio', T.tealMid);
        }
      }
    }
  } else {
    ({data:result,error}=await db.from('eventos').insert(data).select().single());
  }
  if(error){toast('Error: '+error.message,T.red);return null;}
  await loadAll();
  return data.id || result?.id;
}

async function invitarGuias(eventoId, guiaIds){
  const evento = S.eventos.find(e=>e.id===eventoId);
  if(!evento) return;
  const horas = SLA[evento.prioridad] || 48;
  const expira = new Date(Date.now() + horas*60*60*1000).toISOString();

  // Mark evento as ASIGNADO while waiting for confirmation
  await db.from('eventos').update({estado:'ASIGNADO'}).eq('id',eventoId);

  for(const gid of guiaIds){
    // create invitation
    const {data:inv, error} = await db.from('invitaciones')
      .insert({ evento_id:eventoId, guia_id:gid, expira_at:expira })
      .select().single();
    if(error){ toast('Error creando invitación: '+error.message,T.red); continue; }

    // log
    await db.from('historial').insert({
      evento_id:eventoId, guia_id:gid, invitacion_id:inv.id,
      accion:'INVITACION_ENVIADA', actor:'ADMIN',
      detalle:`Expira: ${new Date(expira).toLocaleString('es-AR')}`
    });

    // send email
    const guia = S.guias.find(g=>g.id===gid);
    if(guia) await sendInviteEmail(guia, evento, inv.token, expira);
  }
  await loadAll();
  toast(`✅ ${guiaIds.length} invitación(es) enviada(s)`);
}

async function responderInvitacion(token, accion){
  // find invitation
  const {data:inv} = await db.from('invitaciones').select('*').eq('token',token).single();
  if(!inv) return {ok:false, msg:'Invitación no encontrada'};
  if(inv.estado !== 'PENDIENTE') return {ok:false, msg: inv.estado==='ACEPTADA'?'Ya aceptaste esta invitación': inv.estado==='CANCELADA'||inv.estado==='TOMADA_POR_OTRO'?'Este evento ya no está disponible':'Esta invitación ya fue procesada'};
  if(new Date() > new Date(inv.expira_at)) return {ok:false, msg:'Esta invitación expiró'};

  if(accion==='aceptar'){
    // check if already confirmed by another
    const {data:evento} = await db.from('eventos').select('*').eq('id',inv.evento_id).single();
    if(evento?.estado==='CONFIRMADO') {
      await db.from('invitaciones').update({estado:'TOMADA_POR_OTRO',respondido_at:new Date().toISOString()}).eq('id',inv.id);
      await db.from('historial').insert({evento_id:inv.evento_id,guia_id:inv.guia_id,invitacion_id:inv.id,accion:'TOMADA_POR_OTRO',actor:'SISTEMA'});
      return {ok:false, msg:'Lo sentimos, este evento ya fue tomado por otro guía.'};
    }
    // confirm
    await db.from('invitaciones').update({estado:'ACEPTADA',respondido_at:new Date().toISOString()}).eq('id',inv.id);
    await db.from('eventos').update({estado:'CONFIRMADO',guia_id:inv.guia_id}).eq('id',inv.evento_id);
    // cancel others
    const {data:otrasInv} = await db.from('invitaciones').select('*').eq('evento_id',inv.evento_id).eq('estado','PENDIENTE').neq('id',inv.id);
    if(otrasInv?.length){
      for(const otra of otrasInv){
        await db.from('invitaciones').update({estado:'TOMADA_POR_OTRO',respondido_at:new Date().toISOString()}).eq('id',otra.id);
        await db.from('historial').insert({evento_id:inv.evento_id,guia_id:otra.guia_id,invitacion_id:otra.id,accion:'TOMADA_POR_OTRO',actor:'SISTEMA',detalle:'Evento confirmado por otro guía'});
      }
    }
    await db.from('historial').insert({evento_id:inv.evento_id,guia_id:inv.guia_id,invitacion_id:inv.id,accion:'ACEPTADA',actor:'GUIA'});
    // fetch evento to return for Google Calendar
    const {data:eventoData} = await db.from('eventos').select('*').eq('id',inv.evento_id).single();
    return {ok:true, msg:'¡Perfecto! Quedaste confirmado para este evento. Te esperamos.', evento: eventoData};
  } else {
    // RECHAZAR
    const {error:errUpd} = await db.from('invitaciones').update({estado:'RECHAZADA',respondido_at:new Date().toISOString()}).eq('id',inv.id);
    if(errUpd){ console.error('Error updating invitacion:', errUpd); return {ok:false, msg:'Error al registrar: '+errUpd.message}; }
    
    const {error:errHist} = await db.from('historial').insert({evento_id:inv.evento_id,guia_id:inv.guia_id,invitacion_id:inv.id,accion:'RECHAZADA',actor:'GUIA',detalle:'Guía rechazó desde app/mail'});
    if(errHist){ console.error('Error inserting historial:', errHist); }
    
    // revert to A_ASIGNAR if no more pending invitations
    const {data:pendAun} = await db.from('invitaciones').select('id').eq('evento_id',inv.evento_id).eq('estado','PENDIENTE');
    if(!pendAun?.length){
      const {error:errEv} = await db.from('eventos').update({estado:'A_ASIGNAR'}).eq('id',inv.evento_id);
      if(errEv){ console.error('Error updating evento:', errEv); }
    }
    return {ok:true, msg:'Entendemos, quedó registrado. ¡Hasta la próxima!'};
  }
}

function calcularTotal(){
  const horas = parseFloat(document.getElementById('liq-horas')?.value||0);
  const extras = parseFloat(document.getElementById('liq-extras')?.value||0);
  const valorHora = parseFloat(document.getElementById('btn-save-liq')?.dataset.valorHora||0);
  const total = (horas * valorHora) + extras;
  const el = document.getElementById('liq-total-display');
  if(el) el.textContent = '$' + total.toLocaleString('es-AR');
}

async function saveLiquidacion(eventoId, valorHora){
  const horas   = parseFloat(document.getElementById('liq-horas')?.value||0);
  const extras  = parseFloat(document.getElementById('liq-extras')?.value||0);
  const detalle = document.getElementById('liq-detalle-extras')?.value?.trim()||null;
  const obs     = document.getElementById('liq-observaciones')?.value?.trim()||null;

  if(!horas || horas<=0){ toast('Ingresá las horas trabajadas', T.red); return; }

  const total = (horas * valorHora) + extras;

  const {error} = await db.from('liquidaciones').insert({
    evento_id:       eventoId,
    guia_id:         S.myGuia?.id,
    horas:           horas,
    valor_hora:      valorHora,
    gastos_extras:   extras||0,
    detalle_extras:  detalle,
    observaciones:   obs,
    total:           total,
    estado:          'PENDIENTE',
  });

  if(error){ toast('Error: '+error.message, T.red); return; }
  await loadLiquidaciones();
  set({modal:null});
  toast('✅ Liquidación enviada correctamente');
}

function exportLiquidaciones(){
  const allLiqs = S.liquidaciones||[];
  const rows = [['Guía','Email','Evento','Nro File','Fecha','Horas','Valor Hora','Subtotal','Gastos Extras','Detalle Extras','Total','Estado','Observaciones']];
  allLiqs.forEach(l=>{
    const guia = S.guias.find(g=>g.id===l.guia_id);
    const evento = S.eventos.find(e=>e.id===l.evento_id);
    rows.push([
      guia?guia.nombre+' '+guia.apellido:'—',
      guia?.email||'—',
      evento?.tipo_evento||'—',
      evento?.nro_file||'—',
      evento?.fecha||'—',

async function cancelarEvento(eventoId){
  const evento = S.eventos.find(e=>e.id===eventoId);
  if(!evento) return;

  // ask for optional reason
  const motivo = prompt('Motivo de cancelación (opcional):') || '';

  // notify confirmed guia if any
  if(evento.guia_id){
    const guia = S.guias.find(g=>g.id===evento.guia_id);
    if(guia) await sendCancelEmail(guia, evento, motivo);
  }

  // cancel event
  await db.from('eventos').update({estado:'CANCELADO', guia_id:null}).eq('id',eventoId);

  // cancel all pending invitations
  const {data:pendientes} = await db.from('invitaciones').select('*').eq('evento_id',eventoId).eq('estado','PENDIENTE');
  if(pendientes?.length){
    for(const inv of pendientes){
      await db.from('invitaciones').update({estado:'CANCELADA',respondido_at:new Date().toISOString()}).eq('id',inv.id);
      // notify each pending guia too
      const guia = S.guias.find(g=>g.id===inv.guia_id);
      if(guia) await sendCancelEmail(guia, evento, motivo);
    }
  }

  // log
  await db.from('historial').insert({
    evento_id: eventoId,
    accion: 'EVENTO_CANCELADO',
    actor: 'ADMIN',
    detalle: `Cancelado por ${S.user?.email}${motivo?' · '+motivo:''}`
  });
  await loadAll();
  toast('✅ Evento cancelado y guías notificados');
}

async function bajarseEvento(eventoId){
  const evento = S.eventos.find(e=>e.id===eventoId);
  if(!evento) return;
  if(!confirm('¿Confirmas que querés bajarte de este evento?')) return;
  const motivo = prompt('Motivo (opcional):') || '';
  const guia = S.myGuia;

  // Revert event to A_ASIGNAR and remove guia
  await db.from('eventos').update({estado:'A_ASIGNAR', guia_id:null}).eq('id',eventoId);

  // Mark invitation as RECHAZADA
  const {data:invs} = await db.from('invitaciones').select('*').eq('evento_id',eventoId).eq('guia_id',guia.id);
  if(invs?.length){
    await db.from('invitaciones').update({estado:'RECHAZADA',respondido_at:new Date().toISOString()}).eq('id',invs[0].id);
  }

  // Log with special accion so admin sees alert
  await db.from('historial').insert({
    evento_id: eventoId,
    guia_id: guia.id,
    accion: 'GUIA_SE_BAJO',
    actor: 'GUIA',
    detalle: `${guia.nombre} ${guia.apellido} se bajó del evento${motivo?' · Motivo: '+motivo:''}`
  });

  await loadAll();
  toast('✅ Te bajaste del evento.', T.coral);
}

async function cancelarInvitacion(invId){
  await db.from('invitaciones').update({estado:'CANCELADA',respondido_at:new Date().toISOString()}).eq('id',invId);
  const inv = S.invitaciones.find(i=>i.id===invId);

async function checkSLA(){
  const now = new Date().toISOString();
  const {data:expired} = await db.from('invitaciones').select('*').eq('estado','PENDIENTE').lt('expira_at',now);
  if(!expired?.length) return;
  for(const inv of expired){
    await db.from('invitaciones').update({estado:'EXPIRADA'}).eq('id',inv.id);
    await db.from('historial').insert({evento_id:inv.evento_id,guia_id:inv.guia_id,invitacion_id:inv.id,accion:'EXPIRADA_SLA',actor:'SISTEMA'});
  }
  // check events with all invitations expired/rejected -> keep A_ASIGNAR (already is)
  await loadAll();
  if(expired.length) toast(`⚠️ ${expired.length} invitación(es) expirada(s) por SLA`,'#856404');
}

// ── EMAIL ─────────────────────────────────────────────────────────────────────
async function sendInviteEmail(guia, evento, token, expira){
  const aceptarUrl  = `${APP_URL}?token=${token}&accion=aceptar`;
  const rechazarUrl = `${APP_URL}?token=${token}&accion=rechazar`;
  const fechaEvento = new Date(evento.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const fechaExpira = new Date(expira).toLocaleString('es-AR');
  const horario     = evento.hora_inicio + (evento.hora_fin ? ' - '+evento.hora_fin : '');

  try {
    await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      to_email:    guia.email,
      guia_nombre: guia.nombre + ' ' + guia.apellido,
      tipo_evento: evento.tipo_evento,
      fecha:       fechaEvento,
      horario:     horario,
      prioridad:   evento.prioridad,
      descripcion: evento.descripcion || '—',
      expira:      fechaExpira,
      url_aceptar: aceptarUrl,
      url_rechazar:rechazarUrl,
    }, EMAILJS_KEY);
    console.log('Email enviado a', guia.email);
  } catch(e){ console.error('EmailJS error:', e); }
}

async function sendCancelEmail(guia, evento, motivo=''){
  const fechaEvento = new Date(evento.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const horario = evento.hora_inicio + (evento.hora_fin ? ' - '+evento.hora_fin : '');
  try {
    await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE_CANCEL, {
      to_email:    guia.email,
      guia_nombre: guia.nombre + ' ' + guia.apellido,
      tipo_evento: evento.tipo_evento,
      fecha:       fechaEvento,
      horario:     horario,
      motivo:      motivo || 'Sin especificar',
    }, EMAILJS_KEY);
    console.log('Email cancelación enviado a', guia.email);
  } catch(e){ console.error('EmailJS cancel error:', e); }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildGCalUrl(evento){
  if(!evento?.fecha) return '#';
  const dateStr = evento.fecha.replace(/-/g,'');
  const toTime = t => t ? t.replace(':','')+'00' : '000000';
  const start = dateStr + 'T' + toTime(evento.hora_inicio);
  const end   = dateStr + 'T' + toTime(evento.hora_fin || evento.hora_inicio);
  const title = encodeURIComponent((evento.nro_file ? '['+evento.nro_file+'] ' : '') + (evento.tipo_evento||'Evento') + ' - Say Hueque');
  const details = encodeURIComponent(evento.descripcion || '');
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}`;
}

          <div><label style="font-size:11px;font-weight:600;color:#9E9A93;text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:5px">Contraseña</label><input id="login-pass" type="password" placeholder="••••••••" style="${iStyle}"/></div>
          <button id="btn-login" style="${btnP(T.teal)}width:100%;margin-top:6px;font-size:14px;padding:12px">Ingresar -></button>
          <div style="text-align:center;font-size:12px;color:#9E9A93">¿No tenés cuenta? <button id="btn-go-register" style="background:none;border:none;color:${T.tealMid};font-weight:600;cursor:pointer;font-size:12px">Crear cuenta</button></div>
        </div>
      </div>
    </div>
  </div>
  ${S.modal?.type==='register'?buildRegModal():''}
  ${buildToast()}`;
}

function buildRegModal(){
  return `
  <div id="modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="background:white;border-radius:16px;width:100%;max-width:420px;padding:36px;animation:slideIn 0.2s ease">
      <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:20px">Crear usuario</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div><label style="font-size:11px;font-weight:600;color:#9E9A93;text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:5px">Email</label><input id="reg-email" type="email" style="${iStyle}"/></div>
        <div><label style="font-size:11px;font-weight:600;color:#9E9A93;text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:5px">Contraseña</label><input id="reg-pass" type="password" style="${iStyle}"/></div>
        <div style="display:flex;gap:10px"><button id="btn-cancel-reg" style="${btnS}flex:1">Cancelar</button><button id="btn-do-register" style="${btnP(T.tealMid)}flex:1">Crear</button></div>
      </div>
    </div>
  </div>`;
}

// ── MAIN LAYOUT ───────────────────────────────────────────────────────────────
function buildMain(){
  const pendInv = S.invitaciones.filter(i=>i.estado==='PENDIENTE').length;
  const pageContent = S.view==='dashboard'  ? buildDashboard()
    : S.view==='transportistas' ? buildTransportistas()
    : S.view==='guias'        ? buildGuias()
    : S.view==='eventos'      ? buildEventos()
    : S.view==='calendario'   ? buildCalendario()
    : S.view==='historial'    ? buildHistorial()
    : S.view==='invitaciones' ? buildMisInvitaciones()
    : S.view==='liquidaciones'? buildLiquidaciones()
    : S.view==='usuarios'     ? buildUsuarios()
    : buildDashboard();
  return `
  <div style="display:flex;height:100vh;overflow:hidden">
    ${buildSidebar(pendInv)}
    ${buildMobileDrawer(pendInv)}
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      ${buildTopBar()}
      <div style="flex:1;overflow:auto;padding-bottom:70px" class="page-scroll-area">
        ${pageContent}
      </div>
    </div>
  </div>
  ${buildBottomNav(pendInv)}
  ${S.modal ? buildModal() : ''}
  ${buildToast()}`;
}

function buildMobileDrawer(pendInv){
  const allItems=[
    {id:'dashboard',    icon:'📊', label:'Dashboard',       admin:false},
    {id:'eventos',      icon:'📋', label:'Eventos',         admin:false, badge: S.eventos.filter(e=>e.estado==='A_ASIGNAR').length},
    {id:'calendario',   icon:'📅', label:'Calendario',      admin:false},
    {id:'guias',        icon:'👤', label:'Guías',           admin:true},
    {id:'invitaciones', icon:'📨', label:'Mis invitaciones',admin:false, guiaOnly:true, badge: S.invitaciones.filter(i=>i.estado==='PENDIENTE').length},
    {id:'historial',    icon:'📜', label:'Historial',       admin:false},
    {id:'liquidaciones',icon:'💰', label:'Liquidaciones',   admin:false},
    {id:'usuarios',     icon:'🔑', label:'Usuarios',        admin:true},
  ];
  const items = allItems.filter(i => (!i.admin || isAdmin()) && (!i.guiaOnly || !isAdmin()));
  return `
  <div id="mobile-drawer" class="mobile-drawer" style="position:fixed;inset:0;z-index:500;flex-direction:row;display:none">
    <div style="width:280px;background:${T.teal};display:flex;flex-direction:column;height:100%;overflow:auto">
      <div style="padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-family:'Playfair Display',serif;font-size:16px;color:white;font-weight:700">Say Hueque</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;text-transform:uppercase;letter-spacing:0.1em">${isAdmin()?'Admin':'Panel de Guía'}</div>
        </div>
        <button id="btn-close-drawer" style="background:rgba(255,255,255,0.15);border:none;border-radius:8px;color:white;font-size:20px;width:36px;height:36px;cursor:pointer">×</button>
      </div>

async function saveTransportista(data){
  let error;
  if(data.id){ const {id:_tid,...upd}=data; ({error}=await db.from('transportistas').update(upd).eq('id',data.id)); }
  else        { ({error}=await db.from('transportistas').insert(data)); }
  if(error){ toast('Error: '+error.message,T.red); return false; }
  await loadAll(); return true;
}

async function deleteTransportista(id){
  if(!confirm('¿Eliminar este transportista?')) return;
  await db.from('transportistas').delete().eq('id',id);
  await loadAll();
  toast('Transportista eliminado');
}

function renderEventosTable(){
  const tbody = document.getElementById('eventos-tbody');
  if(!tbody) return;
  const searchFile = (S.searchFile||'').toLowerCase().trim();
  const filtered = S.eventos
    .filter(e => {
      if(!S.filterEstado || S.filterEstado==='ACTIVOS') return e.estado !== 'CANCELADO';
      return e.estado === S.filterEstado;
    })
    .filter(e => !searchFile || (e.nro_file||'').toLowerCase().includes(searchFile) || (e.tipo_evento||'').toLowerCase().includes(searchFile));
  
  // update counter
  const counter = document.getElementById('eventos-counter');
  if(counter) counter.textContent = filtered.length + ' evento(s)';
  
  // update clear button
  const clearBtn = document.getElementById('btn-clear-search');
  if(clearBtn) clearBtn.style.display = searchFile ? 'inline-block' : 'none';

  if(filtered.length===0){
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#9E9A93">Sin eventos</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(e=>{
    const open=S.expandedEventId===e.id;
    const guia=S.guias.find(g=>g.id===e.guia_id);
    const fecha=new Date(e.fecha+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'});
    return buildEventoRow(e, open, guia, fecha);
  }).join('');
  attachEventoRowEvents();
}

function showCalTooltip(el, rect){
  let tip = document.getElementById('cal-tooltip');
  if(!tip){
    tip = document.createElement('div');
    tip.id = 'cal-tooltip';
    tip.style.cssText = 'position:fixed;z-index:9999;background:#1A1A1A;color:white;padding:10px 14px;border-radius:10px;font-size:12px;font-family:DM Sans,sans-serif;line-height:1.8;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,0.35);max-width:260px';
    document.body.appendChild(tip);
  }
  try {
    const d = JSON.parse(el.dataset.calTip.replace(/&quot;/g,'"'));
    const lines = [
      '<strong style="font-size:13px">'+d.tipo+'</strong>',
      d.file ? '📁 '+d.file : '',
      d.horario ? '🕐 '+d.horario : '',
      d.guia ? '👤 '+d.guia : '',
      d.transportista ? '🚐 '+d.transportista : '',
      d.descripcion ? '📝 '+d.descripcion : '',
      '<span style="font-size:10px;opacity:0.65;text-transform:uppercase;letter-spacing:0.05em">'+d.estado+'</span>',
    ].filter(Boolean).join('<br/>');
    tip.innerHTML = lines;
  } catch(e){ return; }
  tip.style.display = 'block';
  const tipW = 260;
  let left = rect.left + rect.width/2 - tipW/2;
  if(left < 8) left = 8;
  if(left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
  tip.style.left = left+'px';
  tip.style.top = (rect.top - 8 + window.scrollY)+'px';
  tip.style.transform = 'translateY(-100%)';
}

function hideCalTooltip(){
  const tip = document.getElementById('cal-tooltip');
  if(tip) tip.style.display = 'none';
}

function buildCalendario(){
  const year=S.calMonth.getFullYear(), month=S.calMonth.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthName=new Date(year,month,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});
  const today=new Date().toDateString();

  const cells=[];
  const offset=(firstDay+6)%7; // Monday start
  for(let i=0;i<offset;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  return `
  <div style="padding:24px;display:flex;flex-direction:column;gap:16px">
    <div style="background:white;border:1.5px solid #E8E4DD;border-radius:12px;padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <button id="cal-prev" style="${btnS}padding:6px 14px">‹</button>
        <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:${T.dark};text-transform:capitalize">${monthName}</div>
        <button id="cal-next" style="${btnS}padding:6px 14px">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px">
        ${['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:#9E9A93;padding:6px 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
        ${cells.map(d=>{
          if(!d) return `<div></div>`;
          const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const dayEvents=S.eventos.filter(e=>{
            if(e.fecha!==dateStr||e.estado==='CANCELADO') return false;
            // guia only sees confirmed events where they are assigned
            if(!isAdmin()) return e.estado==='CONFIRMADO' && e.guia_id===S.myGuia?.id;
            return true;
          });
          const isToday=new Date(year,month,d).toDateString()===today;
          return `
          <div style="min-height:72px;border-radius:8px;padding:6px;background:${isToday?T.teal+'15':'#F9F8F6'};border:1.5px solid ${isToday?T.teal:'transparent'}">
            <div style="font-size:12px;font-weight:${isToday?700:500};color:${isToday?T.teal:T.dark};margin-bottom:4px">${d}</div>
            ${dayEvents.slice(0,3).map(e=>{
              const color=e.estado==='CONFIRMADO'?T.green:e.prioridad==='URGENTE'?T.red:T.amber;
              const label = isAdmin()
                ? esc(e.tipo_evento)+(e.nro_file?' / '+esc(e.nro_file):'')
                : esc(e.tipo_evento)+(e.nro_file?' / '+esc(e.nro_file):'')+(e.hora_inicio?' · '+e.hora_inicio:'');
              const guia = S.guias.find(g=>g.id===e.guia_id);
              const tr = S.transportistas?.find(t=>t.id===e.transportista_id);
              const tipData = JSON.stringify({
                tipo: e.tipo_evento,
                file: e.nro_file||'',
                horario: e.hora_inicio?(e.hora_inicio+(e.hora_fin?' → '+e.hora_fin:'')):'',
                guia: (isAdmin()&&guia)?(guia.nombre+' '+guia.apellido):'',
                transportista: tr?tr.nombre:'',
                descripcion: e.descripcion?e.descripcion.slice(0,80):'',
                estado: e.estado,
              }).replace(/"/g,'&quot;');
              return `<div style="font-size:10px;background:${color};color:white;border-radius:4px;padding:2px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer" data-toggle-evento="${e.id}" data-cal-tip="${tipData}" onclick="event.stopPropagation()">${label}</div>`;
            }).join('')}
            ${dayEvents.length>3?`<div style="font-size:9px;color:#9E9A93">+${dayEvents.length-3} más</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

// ── HISTORIAL ─────────────────────────────────────────────────────────────────
function buildHistorial(){
  const ACCION_ICONS={'INVITACION_ENVIADA':'📧','ACEPTADA':'✅','RECHAZADA':'❌','EXPIRADA_SLA':'⏱','CANCELADA':'🚫','TOMADA_POR_OTRO':'👤','GUIA_SE_BAJO':'🚫','EVENTO_CANCELADO':'❌'};
  return `
  <div style="padding:24px">
    <div style="background:white;border:1.5px solid #E8E4DD;border-radius:12px;overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid #E8E4DD;display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:13px;font-weight:600;color:${T.dark}">${S.historial.length} registros</div>
        <button id="btn-export" style="${btnP(T.teal)}padding:7px 16px;font-size:12px">⬇ Exportar CSV</button>
      </div>
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="background:#F5F3EF">
            ${['Fecha/Hora','Evento','Guía','Acción','Detalle','Actor'].map(h=>`<th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#9E9A93;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap">${h}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${S.historial.length===0?`<tr><td colspan="6" style="text-align:center;padding:40px;color:#9E9A93">Sin registros</td></tr>`:
            S.historial.map(h=>{
              const evento=S.eventos.find(e=>e.id===h.evento_id);
              const guia=S.guias.find(g=>g.id===h.guia_id);
              const icon=ACCION_ICONS[h.accion]||'•';
              const fecha=new Date(h.created_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
              return `
              <tr style="border-bottom:1px solid #F5F3EF" onmouseenter="this.style.background='#F9F8F6'" onmouseleave="this.style.background='white'">
                <td style="padding:10px 14px;font-size:12px;color:#9E9A93;white-space:nowrap">${fecha}</td>
                <td style="padding:10px 14px;font-size:12px;font-weight:600;color:${T.dark}">${evento?esc(evento.tipo_evento):'—'}</td>
                <td style="padding:10px 14px;font-size:12px;color:${T.tealMid};font-weight:600">${guia?esc(guia.nombre+' '+guia.apellido):'—'}</td>
                <td style="padding:10px 14px"><span style="font-size:12px;font-weight:600">${icon} ${esc(h.accion)}</span></td>
                <td style="padding:10px 14px;font-size:12px;color:#9E9A93;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(h.detalle||'')}</td>
                <td style="padding:10px 14px"><span style="font-size:10px;background:#F5F3EF;color:#9E9A93;padding:2px 8px;border-radius:10px;font-weight:600">${esc(h.actor||'SISTEMA')}</span></td>
              </tr>`;
            }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

  return buildLiquidacionesGuia();

function buildLiquidacionesGuia(){
  // eventos confirmados del guía actual
  const misEventos = S.eventos.filter(e=>e.estado==='CONFIRMADO' && e.guia_id===S.myGuia?.id)
    .sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));

  return `
  <div style="padding:24px;display:flex;flex-direction:column;gap:20px;max-width:800px">
    <div style="background:white;border:1.5px solid #E8E4DD;border-radius:12px;padding:20px">
      <div style="font-size:12px;font-weight:700;color:#9E9A93;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px">💰 Mis eventos — cargar liquidación</div>

          const fecha = new Date(e.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});

          <div style="border:1.5px solid ${liq?'#D4EDDA':'#E8E4DD'};border-radius:10px;padding:16px;background:${liq?'#F8FFF9':'white'}">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="flex:1">
                <div style="font-size:13px;font-weight:700;color:#1A1A1A">${esc(e.tipo_evento)}</div>
                <div style="font-size:11px;color:#9E9A93">${fecha}${e.nro_file?' · 📁 '+esc(e.nro_file):''}${e.hora_inicio?' · '+e.hora_inicio:''}</div>
              </div>
              ${liq?`
                <div style="text-align:right">
                  <div style="font-size:14px;font-weight:700;color:#2E7D32">$${liq.total.toLocaleString('es-AR')}</div>

// ── MIS INVITACIONES (vista guía) ────────────────────────────────────────────
function buildMisInvitaciones(){
  // exclude pendientes where event is already confirmed (accepted via email)
  const pendientes = S.invitaciones.filter(i=>{
    if(i.estado!=='PENDIENTE') return false;
    const ev = S.eventos.find(e=>e.id===i.evento_id);
    // if event is confirmed with this guia, it means they already accepted via email
    if(ev?.estado==='CONFIRMADO' && ev?.guia_id===i.guia_id) return false;
    // if event is confirmed with someone else, show as TOMADA_POR_OTRO
    return true;
  });
  // fix display: show accepted-via-email as ACEPTADA in historial
  const pasadas = S.invitaciones.filter(i=>{
    if(i.estado!=='PENDIENTE') return true;
    const ev = S.eventos.find(e=>e.id===i.evento_id);
    // confirmed with this guia = accepted via email, show in historial
    return ev?.estado==='CONFIRMADO' && ev?.guia_id===i.guia_id;
  }).map(i=>{
    const ev = S.eventos.find(e=>e.id===i.evento_id);
    if(i.estado==='PENDIENTE' && ev?.estado==='CONFIRMADO' && ev?.guia_id===i.guia_id){
      return {...i, estado:'ACEPTADA'};
    }
    return i;
  });
  return `
  <div style="padding:24px;display:flex;flex-direction:column;gap:20px;max-width:700px">
    ${pendientes.length===0?'':`
    <div>
      <div style="font-size:12px;font-weight:700;color:#856404;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px">⏳ Pendientes de respuesta (${pendientes.length})</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${pendientes.map(inv=>{
          const evento = S.eventos.find(e=>e.id===inv.evento_id) || {};
          const fecha = evento.fecha ? new Date(evento.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}) : '—';
          const expira = new Date(inv.expira_at).toLocaleString('es-AR');
          const vencida = new Date() > new Date(inv.expira_at);
          return `
          <div style="background:white;border:1.5px solid #E9C46A;border-radius:12px;padding:20px;border-left:4px solid #E9C46A">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px">
              <div>
                <div style="font-size:16px;font-weight:700;color:#1A1A1A">${esc(evento.tipo_evento||'Evento')}</div>
                <div style="font-size:13px;color:#9E9A93;margin-top:3px">${fecha}</div>
              </div>
              <span style="font-size:11px;font-weight:700;color:${evento.prioridad==='URGENTE'?'#E63946':'#1B6B74'};background:${evento.prioridad==='URGENTE'?'#fde8ea':'#e8f4f5'};padding:3px 10px;border-radius:20px;white-space:nowrap">${evento.prioridad||''}</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
              <div style="background:#F5F3EF;border-radius:8px;padding:10px">
                <div style="font-size:10px;font-weight:700;color:#9E9A93;text-transform:uppercase;margin-bottom:3px">Horario</div>
                <div style="font-size:13px;font-weight:600">${evento.hora_inicio||'—'}${evento.hora_fin?' - '+evento.hora_fin:''}</div>
              </div>
              <div style="background:#F5F3EF;border-radius:8px;padding:10px">
                <div style="font-size:10px;font-weight:700;color:#9E9A93;text-transform:uppercase;margin-bottom:3px">Responder antes de</div>
                <div style="font-size:13px;font-weight:600;color:${vencida?'#E63946':'#856404'}">${expira}</div>
              </div>
            </div>
            ${evento.descripcion?`<div style="font-size:12px;color:#555;margin-bottom:14px;padding:10px;background:#F5F3EF;border-radius:8px">${esc(evento.descripcion)}</div>`:''}
            ${(()=>{
              const tr=S.transportistas.find(t=>t.id===evento.transportista_id);
              return tr?`<div style="background:#EEF7F8;border-radius:8px;padding:12px 14px;margin-bottom:14px;border-left:3px solid ${T.teal}">
                <div style="font-size:10px;font-weight:700;color:#1B6B74;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">🚐 Transportista</div>
                <div style="font-size:14px;font-weight:700;color:${T.dark}">${esc(tr.nombre)}</div>
                ${tr.telefono?`<div style="font-size:12px;color:#555;margin-top:3px">📞 ${esc(tr.telefono)}</div>`:''}
                ${tr.contacto?`<div style="font-size:12px;color:#555;margin-top:2px">👤 ${esc(tr.contacto)}</div>`:''}
              </div>`:'';
            })()}
            <div style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap">
              <a href="${buildGCalUrl(evento)}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;background:#4285F4;color:white;font-size:12px;font-weight:600;text-decoration:none;font-family:'DM Sans',sans-serif">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
                Agregar a Google Calendar
              </a>
              ${evento.estado==='CONFIRMADO'&&evento.guia_id===S.myGuia?.id?`<button data-bajar-evento="${evento.id}" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;background:#fff5f5;border:1.5px solid #fcd5d5;color:#E63946;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">🚫 Me bajo del evento</button>`:''}
            </div>
            ${vencida?`<div style="text-align:center;padding:10px;background:#F8D7DA;border-radius:8px;font-size:12px;color:#721c24;font-weight:600">⏱ Esta invitación venció</div>`:`
            <div style="display:flex;gap:10px">
              <button data-responder-inv="${inv.id}" data-accion="aceptar"
                style="flex:1;padding:12px;border-radius:9px;border:none;background:#52B788;color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">
                ✅ Acepto
              </button>
              <button data-responder-inv="${inv.id}" data-accion="rechazar"
                style="flex:1;padding:12px;border-radius:9px;border:1.5px solid #E8E4DD;background:white;color:#555;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">
                ❌ No puedo
              </button>
            </div>`}
          </div>`;
        }).join('')}
      </div>
    </div>`}

    ${pasadas.length===0?'':`
    <div>
      <div style="font-size:12px;font-weight:700;color:#9E9A93;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px">Historial de invitaciones</div>
      <div style="background:white;border:1.5px solid #E8E4DD;border-radius:12px;overflow:hidden">
        ${pasadas.slice(0,10).map(inv=>{
          const evento = S.eventos.find(e=>e.id===inv.evento_id) || {};
          const fecha = evento.fecha ? new Date(evento.fecha+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'}) : '—';
          return `
          <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #F5F3EF">

              <div style="font-size:13px;font-weight:600;color:#1A1A1A">${esc(evento.tipo_evento||'Evento')}</div>
              <div style="font-size:11px;color:#9E9A93">${fecha}${evento.nro_file?' · 📁 '+esc(evento.nro_file):''}</div>
            </div>

            ${inv.estado==='ACEPTADA'?`<button onclick="abrirFeedback(${evento.id})" style="padding:5px 10px;border-radius:6px;border:1px solid #E8E4DD;background:white;font-size:11px;cursor:pointer;color:${T.tealMid};font-weight:600;font-family:'DM Sans',sans-serif">${evento.feedback_texto?'✏️ Ver feedback':'📝 Feedback'}</button>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`}

    ${pendientes.length===0 && pasadas.length===0 ? `

function buildModal(){
  const m=S.modal;
  if(m.type==='guia-form')    return buildGuiaModal(m.entry);
  if(m.type==='evento-form')  return buildEventoModal(m.entry);
  if(m.type==='invitar')      return buildInvitarModal(m.eventoId);
  if(m.type==='register')     return buildRegModal();
  if(m.type==='usuario-form')    return buildUsuarioModal(m.entry);
  if(m.type==='import-preview')  return buildImportPreviewModal(m.entity, m.rows, m.file);
  if(m.type==='calendario-guia')   return buildCalendarioGuiaModal(m.guiaId);
  if(m.type==='feedback')          return buildFeedbackModal(m.eventoId);
  if(m.type==='nueva-liq')         return buildNuevaLiquidacionModal(m.eventoId);
  if(m.type==='ver-liq')           return buildVerLiquidacionModal(m.liqId);
  if(m.type==='config-sla')        return buildSLAModal();
  if(m.type==='wp-agenda')          return buildWPAgendaModal(m.guiaId);
  if(m.type==='transportista-form') return buildTransportistaModal(m.entry||{});
  if(m.type==='enviar-calendario')  return buildEnviarCalendarioModal(m.transportistaId);
  return '';
}

function buildInvitarModal(eventoId){
  const evento=S.eventos.find(e=>e.id===eventoId);
  const guiasActivos=[...S.guias].filter(g=>g.estado==='ACTIVO').sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const invExistentes=S.invitaciones.filter(i=>i.evento_id===eventoId&&['PENDIENTE','ACEPTADA'].includes(i.estado)).map(i=>i.guia_id);
  return `
  <div id="modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="background:white;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,0.25);animation:slideIn 0.2s ease">
      <div style="background:${T.tealMid};padding:20px 28px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="color:rgba(255,255,255,0.7);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">Invitar guías</div>
          <div style="color:white;font-size:18px;font-weight:700;font-family:'Playfair Display',serif">${esc(evento?.tipo_evento)} · ${evento?.fecha}</div>
        </div>
        <button id="btn-close-modal" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;color:white;font-size:20px;width:36px;height:36px;cursor:pointer">×</button>
      </div>
      <div style="padding:24px;display:flex;flex-direction:column;gap:16px">
        <div style="background:#FFF3CD;border-radius:8px;padding:12px 16px;font-size:13px;color:#856404">
          ⏱ SLA: <strong>${SLA[evento?.prioridad]} horas</strong> para responder · El primero que acepte queda confirmado
        </div>
        <div style="font-size:12px;font-weight:700;color:#9E9A93;text-transform:uppercase;letter-spacing:0.08em">Seleccioná guías a invitar</div>
        <div style="display:flex;flex-direction:column;gap:8px;max-height:300px;overflow:auto">
          ${guiasActivos.map(g=>{
            const yaInvitado=invExistentes.includes(g.id);
            const eventosEseDia=S.eventos.filter(e=>e.guia_id===g.id&&e.fecha===evento?.fecha&&e.id!==eventoId&&['CONFIRMADO','ASIGNADO'].includes(e.estado));
            const noDisponible=eventosEseDia.length>0;
            const noDispLabel=eventosEseDia.map(e=>e.hora_inicio+(e.hora_fin?' - '+e.hora_fin:'')).join(', ');
            const disabled=yaInvitado||noDisponible;
            const borderColor=noDisponible?'#fcd5d5':'#E8E4DD';
            const bgColor=noDisponible?'#fff8f8':'white';
            const avatarBg=noDisponible?'#fcd5d520':T.teal+'20';
            const avatarFg=noDisponible?'#E63946':T.teal;
            return '<label style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;border:1.5px solid '+borderColor+';cursor:'+(disabled?'not-allowed':'pointer')+';opacity:'+(disabled?0.6:1)+';background:'+bgColor+'" '+(disabled?'':' onmouseenter="this.style.borderColor=\'#2A9D8F\'" onmouseleave="this.style.borderColor=\'#E8E4DD\'"')+'>'
              +'<input type="checkbox" value="'+g.id+'" '+(disabled?'disabled ':'')+' '+(yaInvitado?'checked':'')+' style="width:16px;height:16px;accent-color:'+T.tealMid+';cursor:pointer"/>'
              +'<div style="width:34px;height:34px;border-radius:50%;background:'+avatarBg+';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:'+avatarFg+';flex-shrink:0">'+esc(g.nombre[0])+'</div>'
              +'<div style="flex:1">'
                +'<div style="font-size:13px;font-weight:600;color:'+T.dark+'">'+esc(g.nombre)+' '+esc(g.apellido)+'</div>'
                +'<div style="font-size:11px;color:#9E9A93">'+(isAdmin()?g.tipo+' · $'+g.valor_hora+'/h · ':'')+esc(g.email)+'</div>'
                +(noDisponible?'<div style="font-size:11px;color:#E63946;font-weight:600;margin-top:2px">⛔ No disponible · '+noDispLabel+'</div>':'')
              +'</div>'
              +(yaInvitado?'<span style="font-size:10px;background:#D4EDDA;color:#155724;padding:2px 8px;border-radius:10px;font-weight:600">Ya invitado</span>':'')
              +'</label>';
          }).join('')}
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button id="btn-close-modal2" style="${btnS}">Cancelar</button>
          <button id="btn-enviar-invitaciones" data-evento-id="${eventoId}" style="${btnP(T.tealMid)}box-shadow:0 4px 14px ${T.tealMid}50">📧 Enviar invitaciones</button>
        </div>
      </div>
    </div>
  </div>`;
}

function buildImportPreviewModal(entity, rows, filename){

  const cols = isGuias
    ? ['nombre','apellido','email','telefono','valor_hora','tipo','estado']
    : ['tipo_evento','fecha','hora_inicio','hora_fin','prioridad','descripcion'];
  const preview = rows.slice(0,5);
  return `
  <div id="modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="background:white;border-radius:16px;width:100%;max-width:780px;max-height:90vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,0.25);animation:slideIn 0.2s ease">
      <div style="background:${T.tealMid};padding:20px 28px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="color:rgba(255,255,255,0.7);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">Importar ${isGuias?'guías':'eventos'}</div>
          <div style="color:white;font-size:16px;font-weight:700">${filename} · ${rows.length} filas detectadas</div>
        </div>
        <button id="btn-close-modal" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;color:white;font-size:20px;width:36px;height:36px;cursor:pointer">×</button>
      </div>
      <div style="padding:24px;display:flex;flex-direction:column;gap:16px">
        <div style="background:#D4EDDA;border-radius:8px;padding:12px 16px;font-size:13px;color:#155724">
          ✅ Se encontraron <strong>${rows.length} filas</strong>. Vista previa de las primeras ${Math.min(5,rows.length)}:
        </div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:12px">
            <thead>
              <tr style="background:#F5F3EF">
                ${cols.map(c=>`<th style="padding:8px 10px;text-align:left;font-weight:700;color:#9E9A93;text-transform:uppercase;font-size:10px;letter-spacing:0.06em;white-space:nowrap">${c}</th>`).join('')}
              </tr>
            </thead>

function buildCalendarioGuiaModal(guiaId){
  const guia = S.guias.find(g=>g.id===guiaId);
  if(!guia) return '';
  const misEventos = S.eventos
    .filter(e=>e.guia_id===guiaId && e.estado!=='CANCELADO')
    .sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

  // build mini calendar — current + next month
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();

  const eventDates = new Set(misEventos.map(e=>e.fecha));

  function buildMiniMonth(y, m){
    const monthName = new Date(y,m,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});
    const firstDay = new Date(y,m,1).getDay();
    const daysInMonth = new Date(y,m+1,0).getDate();
    const offset = firstDay===0?6:firstDay-1; // monday first
    let cells = '';
    for(let i=0;i<offset;i++) cells+=`<div></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const hasEvent = eventDates.has(dateStr);
      const isToday = dateStr===today.toISOString().slice(0,10);
      cells+=`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;font-weight:${hasEvent?700:400};background:${hasEvent?T.teal:isToday?T.teal+'20':'transparent'};color:${hasEvent?'white':isToday?T.teal:'#1A1A1A'};position:relative">
        ${d}
        ${hasEvent?`<span style="position:absolute;bottom:1px;width:4px;height:4px;border-radius:50%;background:${T.coral}"></span>`:''}
      </div>`;
    }
    return `<div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:#1A1A1A;text-transform:capitalize;margin-bottom:10px;text-align:center">${monthName}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">
        ${['Lu','Ma','Mi','Ju','Vi','Sa','Do'].map(d=>`<div style="font-size:10px;font-weight:700;color:#9E9A93;padding:4px 0">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>`;
  }

  return `
  <div id="modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="background:white;border-radius:16px;width:100%;max-width:620px;max-height:90vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,0.25);animation:slideIn 0.2s ease">
      <div style="background:linear-gradient(135deg,${T.teal},${T.tealMid});padding:20px 28px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="color:rgba(255,255,255,0.7);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">Calendario del guía</div>
          <div style="color:white;font-size:18px;font-weight:700">${esc(guia.nombre)} ${esc(guia.apellido)}</div>
          <div style="color:rgba(255,255,255,0.6);font-size:12px;margin-top:2px">${guia.tipo} · ${misEventos.length} evento(s) confirmado(s)</div>
        </div>
        <button id="btn-close-modal" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;color:white;font-size:20px;width:36px;height:36px;cursor:pointer">×</button>
      </div>
      <div style="padding:24px;display:flex;flex-direction:column;gap:20px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          ${buildMiniMonth(year, month)}
          ${buildMiniMonth(year, month+1 > 11 ? 0 : month+1)}
        </div>
        ${misEventos.length===0?`<div style="text-align:center;padding:20px;color:#9E9A93">Sin eventos confirmados</div>`:`
        <div>
          <div style="font-size:11px;font-weight:700;color:#9E9A93;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">Próximos eventos</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${misEventos.map(e=>{
              const fecha = new Date(e.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'short',day:'2-digit',month:'short'});
              const past = new Date(e.fecha) < today;
              return `<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;background:${past?'#F5F3EF':'white'};border:1.5px solid ${past?'#E8E4DD':T.teal+'40'}">
                <div style="width:42px;text-align:center;flex-shrink:0">
                  <div style="font-size:18px;font-weight:700;color:${past?'#9E9A93':T.teal};line-height:1">${new Date(e.fecha+'T12:00:00').getDate()}</div>
                  <div style="font-size:10px;color:#9E9A93;text-transform:uppercase">${new Date(e.fecha+'T12:00:00').toLocaleDateString('es-AR',{month:'short'})}</div>
                </div>
                <div style="flex:1">
                  <div style="font-size:13px;font-weight:600;color:${past?'#9E9A93':'#1A1A1A'}">${esc(e.tipo_evento)}</div>
                  <div style="font-size:11px;color:#9E9A93">${e.hora_inicio}${e.hora_fin?' - '+e.hora_fin:''}${e.nro_file?' · 📁 '+esc(e.nro_file):''}</div>
                </div>
                <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:${past?'#E8E4DD':'#D4EDDA'};color:${past?'#9E9A93':'#155724'}">${past?'Realizado':'Confirmado'}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`}
      </div>
    </div>
  </div>`;
}

function attachEvents(){
  // Response page
  const params=new URLSearchParams(window.location.search);
  if(params.get('token')){
    const token=params.get('token'), accion=params.get('accion');
    (async()=>{
      const result=await responderInvitacion(token, accion==='aceptar'?'aceptar':'rechazar');
      const box=document.getElementById('response-box');
      if(box){
        let gcalBtn = '';
        if(result.ok && accion==='aceptar' && result.evento){
          const ev = result.evento;
          const gcalUrl = buildGCalUrl(ev);
          gcalBtn = `<a href="${gcalUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:8px;padding:12px 22px;background:#4285F4;color:white;border-radius:9px;font-weight:700;font-size:14px;text-decoration:none;margin-bottom:12px;font-family:'DM Sans',sans-serif">📅 Agregar a Google Calendar</a><br/>`;
        }
        box.innerHTML=`
          <div style="font-size:48px;margin-bottom:16px">${result.ok?(accion==='aceptar'?'✅':'👍'):'⚠️'}</div>
          <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#1A1A1A;margin-bottom:8px">${result.ok?'¡Listo!':'Lo sentimos'}</div>
          <div style="font-size:14px;color:#9E9A93;line-height:1.6;margin-bottom:24px">${result.msg}</div>
          ${gcalBtn}
          <a href="${APP_URL}" style="display:inline-block;padding:12px 24px;background:#1B6B74;color:white;border-radius:9px;font-weight:700;font-size:14px;text-decoration:none">Ir al panel -></a>`;
      }
    })();
    return;
  }

  // nav
  document.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.addEventListener('mouseenter',()=>{if(!btn.style.background.includes('0.15'))btn.style.background='rgba(255,255,255,0.08)';});
    btn.addEventListener('mouseleave',()=>{if(!btn.style.background.includes('0.15'))btn.style.background='transparent';});
    btn.addEventListener('click',()=>set({view:btn.dataset.nav,expandedEventId:null}));
  });

  // open forms

    const t = S.transportistas.find(x=>x.id===tid);

    const eventos = S.eventos.filter(e=>e.transportista_id===tid && e.fecha>=desde && e.fecha<=hasta && e.estado!=='CANCELADO');
    if(!eventos.length){toast('Sin eventos en ese período',T.red);return;}
    // create token
    const {data:tokenData} = await db.from('calendario_tokens').insert({transportista_id:tid,fecha_desde:desde,fecha_hasta:hasta}).select().single();
    if(!tokenData){toast('Error al crear token',T.red);return;}
    const confirmUrl = window.location.origin+window.location.pathname+'?confirmar_calendario='+tokenData.token;
    // build email body
    // Build plain text list for email (avoids HTML escaping issues in EmailJS)
    const eventosList = eventos.map((e,i)=>{
      const guia=S.guias.find(g=>g.id===e.guia_id);

      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE_CALENDARIO_TR, {

    if(accion==='aceptar'){

      const {data:evento} = await db.from('eventos').select('*').eq('id',inv.evento_id).single();

      await db.from('eventos').update({estado:'CONFIRMADO',guia_id:inv.guia_id}).eq('id',inv.evento_id);
      // cancel other pending
      const {data:otras} = await db.from('invitaciones').select('*').eq('evento_id',inv.evento_id).eq('estado','PENDIENTE').neq('id',inv.id);
      for(const otra of (otras||[])){
        await db.from('invitaciones').update({estado:'TOMADA_POR_OTRO',respondido_at:new Date().toISOString()}).eq('id',otra.id);

      await db.from('invitaciones').update({estado:'RECHAZADA',respondido_at:new Date().toISOString()}).eq('id',inv.id);
      await db.from('historial').insert({evento_id:inv.evento_id,guia_id:inv.guia_id,invitacion_id:inv.id,accion:'RECHAZADA',actor:'GUIA',detalle:'Rechazado desde la app'});

  function buildWPText(){
    const guiaId = btnSendWP ? parseInt(btnSendWP.dataset.guiaId) : null;
    const g = S.guias.find(x=>x.id===guiaId);
    const desde = document.getElementById('wp-desde')?.value;
    const hasta  = document.getElementById('wp-hasta')?.value;
    if(!g||!desde||!hasta) return null;

    const evs = S.eventos
      .filter(e=>e.guia_id===g.id && e.estado==='CONFIRMADO' && e.fecha>=desde && e.fecha<=hasta)
      .sort((a,b)=>a.fecha.localeCompare(b.fecha));

    const fmtFecha = f => new Date(f+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long'});

    let msg = 'Hola '+g.nombre+'! 👋 Acá va tu agenda de eventos';
    if(desde===hasta) msg += ' para el '+fmtFecha(desde);
    else msg += ' del '+fmtFecha(desde)+' al '+fmtFecha(hasta);
    msg += ':\n\n';

    if(!evs.length){
      msg += 'No tenés eventos confirmados en ese período.';
    } else {
      evs.forEach((e,i)=>{
        msg += (i+1)+'. \uD83D\uDCC5 '+fmtFecha(e.fecha);
        msg += '\n   '+e.tipo_evento;
        if(e.nro_file)    msg += ' / '+e.nro_file;
        if(e.hora_inicio) msg += '\n   '+e.hora_inicio+(e.hora_fin?' - '+e.hora_fin:'');
        if(e.descripcion) msg += '\n   '+e.descripcion;
        msg += '\n\n';
      });
    }
    msg += 'Cualquier consulta escribinos. Gracias!\n— Say Hueque';
    return {msg, g, evs};
  }

  document.getElementById('feedback-foto')?.addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('foto-preview-img').src = ev.target.result;
      document.getElementById('foto-preview').style.display = 'block';
      document.getElementById('btn-pick-foto').textContent = '✅ ' + file.name;
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('btn-save-feedback')?.addEventListener('click', async()=>{
    const eventoId = parseInt(document.getElementById('btn-save-feedback').dataset.eventoId);
    const texto = document.getElementById('feedback-texto')?.value?.trim();
    const fotoInput = document.getElementById('feedback-foto');
    const fotoFile = fotoInput?.files?.[0] || null;
    const btn = document.getElementById('btn-save-feedback');
    btn.textContent='⟳ Guardando...'; btn.disabled=true;
    await saveFeedback(eventoId, texto, fotoFile);
  });

  // liquidacion listeners
  document.getElementById('btn-save-liq')?.addEventListener('click', async()=>{
    const eventoId  = parseInt(document.getElementById('btn-save-liq').dataset.eventoId);
    const valorHora = parseFloat(document.getElementById('btn-save-liq').dataset.valorHora||0);
    const btn = document.getElementById('btn-save-liq');
    btn.textContent='⟳ Guardando...'; btn.disabled=true;
    await saveLiquidacion(eventoId, valorHora);
    if(btn) { btn.textContent='💾 Enviar liquidación'; btn.disabled=false; }
  });

  document.getElementById('btn-confirm-import')?.addEventListener('click', async()=>{
    const entity = document.getElementById('btn-confirm-import').dataset.entity;
    const rows = S.modal?.rows;
    const btn = document.getElementById('btn-confirm-import');
    btn.textContent='⟳ Importando...'; btn.disabled=true;
    if(entity==='guias') await doImportGuias(rows);
    else await doImportEventos(rows);
  });

  // password reset
  document.getElementById('btn-update-pass')?.addEventListener('click', async()=>{
    const pass = document.getElementById('new-pass')?.value;
    const confirm2 = document.getElementById('new-pass-confirm')?.value;
    if(!pass || pass.length < 6){ toast('La contraseña debe tener al menos 6 caracteres', T.red); return; }
    if(pass !== confirm2){ toast('Las contraseñas no coinciden', T.red); return; }
    const btn = document.getElementById('btn-update-pass');
    btn.textContent = '⟳ Actualizando...'; btn.disabled = true;
    const {error} = await db.auth.updateUser({password: pass});
    if(error){ toast('Error: '+error.message, T.red); btn.textContent='Actualizar contraseña ->'; btn.disabled=false; return; }
    toast('✅ Contraseña actualizada correctamente');
    setTimeout(()=>{ window.location.href = APP_URL; }, 2000);
  });

  // load usuarios panel
  if(S.view==='usuarios' && isAdmin()){
    loadUsuariosPanel();
  }

  // save usuario
  document.getElementById('btn-save-usuario')?.addEventListener('click', async()=>{
    const userId = document.getElementById('btn-save-usuario').dataset.userId;
    const email  = document.getElementById('u-email')?.value?.trim();
    const pass   = document.getElementById('u-pass')?.value?.trim();
    const role   = document.getElementById('u-role')?.value;
    const guiaId = document.getElementById('u-guia')?.value;
    if(!email){toast('El email es obligatorio',T.red);return;}
    if(!userId && !pass){toast('La contraseña es obligatoria para nuevos usuarios',T.red);return;}
    const btn = document.getElementById('btn-save-usuario');
    btn.textContent='⟳ Guardando...'; btn.disabled=true;
    if(!userId){
      // create user via Supabase admin — we use signUp and then set role
      const {data,error} = await db.auth.signUp({email, password:pass});
      if(error){toast('Error: '+error.message,T.red);btn.textContent='✅ Crear usuario';btn.disabled=false;return;}
      const newUserId = data.user?.id;
      if(newUserId){
        await db.from('user_roles').insert({
          user_id: newUserId,
          role: role,
          guia_id: guiaId ? parseInt(guiaId) : null
        });
      }
      toast('✅ Usuario creado. El guía debe confirmar su email.');
    } else {
      // update role
      await db.from('user_roles').upsert({
        user_id: userId,
        role: role,
        guia_id: guiaId ? parseInt(guiaId) : null
      });
      toast('✅ Rol actualizado');
    }
    set({modal:null});
    if(S.view==='usuarios') loadUsuariosPanel();
  });

  // role selector toggle
  document.getElementById('u-role')?.addEventListener('change', function(){
    const gf = document.getElementById('u-guia-field');
    if(gf) gf.style.display = this.value==='guia' ? 'block' : 'none';
  });
  // init toggle
  const roleEl = document.getElementById('u-role');
  const guiaFieldEl = document.getElementById('u-guia-field');
  if(roleEl && guiaFieldEl) guiaFieldEl.style.display = roleEl.value==='guia'?'block':'none';
}

// ── EXPORT ───────────────────────────────────────────────────────────────────
function exportGuias(){
  const rows = [['nombre','apellido','email','telefono','valor_hora','tipo','estado','categoria','prioridad_guia','idiomas','formacion','ente','notas']];
  S.guias.forEach(g => rows.push([g.nombre,g.apellido,g.email,g.telefono||'',g.valor_hora||'',g.tipo,g.estado,g.categoria||'',g.prioridad_guia||'',(g.idiomas||[]).join('|'),g.formacion||'',g.ente||'',g.notas||'']));
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Guías');
  XLSX.writeFile(wb, 'guias_sayhueque.xlsx');
  toast('✅ Exportado correctamente');
}

function exportEventos(){
  const rows = [['tipo_evento','fecha','hora_inicio','hora_fin','prioridad','estado','descripcion','link_adjunto']];
  S.eventos.forEach(e => rows.push([e.tipo_evento,e.fecha,e.hora_inicio,e.hora_fin||'',e.prioridad,e.estado,e.descripcion||'',e.link_adjunto||'']));
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Eventos');
  XLSX.writeFile(wb, 'eventos_sayhueque.xlsx');
  toast('✅ Exportado correctamente');
}

// ── IMPORT ────────────────────────────────────────────────────────────────────
async function importGuias(file){
  const data = await file.arrayBuffer();
  const wb = XLSX.read(data, {cellDates: true});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw: false});

  if(!rows.length){ toast('El archivo está vacío', T.red); return; }

  // show preview modal
  set({modal:{type:'import-preview', entity:'guias', rows, file: file.name}});
}

async function importEventos(file){
  const data = await file.arrayBuffer();
  const wb = XLSX.read(data, {cellDates: true});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw: false, dateNF: 'yyyy-mm-dd'});

  if(!rows.length){ toast('El archivo está vacío', T.red); return; }

  // normalize dates: could be Date object, serial number, or string
  rows.forEach(r => {
    const key = Object.keys(r).find(k => k.toLowerCase().includes('fecha'));
    if(!key) return;
    const val = r[key];
    if(val instanceof Date){
      r[key] = val.toISOString().slice(0,10);
    } else if(typeof val === 'number'){
      // Excel serial date
      const d = new Date(Math.round((val - 25569) * 86400 * 1000));
      r[key] = d.toISOString().slice(0,10);
    } else if(typeof val === 'string' && val.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)){
      // dd/mm/yyyy
      const [d,m,y] = val.split('/');
      r[key] = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    // already yyyy-mm-dd -> keep as is
  });

  set({modal:{type:'import-preview', entity:'eventos', rows, file: file.name}});
}

async function doImportGuias(rows){
  let ok=0, errors=[];
  for(const r of rows){
    const idiomasRaw = String(r.idiomas||r.Idiomas||'').trim();
    const guia = {
      nombre:       String(r.nombre||r.Nombre||'').trim(),
      apellido:     String(r.apellido||r.Apellido||'').trim(),
      email:        String(r.email||r.Email||'').trim().toLowerCase(),
      telefono:     String(r.telefono||r.Telefono||'').trim()||null,
      valor_hora:   parseFloat(r.valor_hora||r['Valor hora']||r.ValorHora||0)||null,
      tipo:         String(r.tipo||r.Tipo||'JUNIOR').toUpperCase().trim(),
      estado:       String(r.estado||r.Estado||'ACTIVO').toUpperCase().trim(),
      categoria:    String(r.categoria||r.Categoria||'').trim()||null,
      prioridad_guia: String(r.prioridad_guia||r['Prioridad']||'').trim()||null,
      idiomas:      idiomasRaw ? idiomasRaw.split('|').map(s=>s.trim()).filter(Boolean) : [],
      formacion:    String(r.formacion||r.Formacion||'').trim()||null,
      ente:         String(r.ente||r.Ente||'').trim()||null,
      notas:        String(r.notas||r.Notas||'').trim()||null,
    };
    if(!guia.nombre||!guia.apellido||!guia.email){ errors.push(`Fila sin nombre/apellido/email`); continue; }
    if(!['SENIOR','JUNIOR'].includes(guia.tipo)) guia.tipo='JUNIOR';
    if(!['ACTIVO','INACTIVO'].includes(guia.estado)) guia.estado='ACTIVO';

    const {error} = await db.from('guias').upsert(guia, {onConflict:'email',ignoreDuplicates:false});
    if(error) errors.push(`${guia.email}: ${error.message}`);
    else ok++;
  }
  await loadAll();
  set({modal:null});
  if(errors.length) toast(`✅ ${ok} importados, ⚠️ ${errors.length} errores`, T.amber);
  else toast(`✅ ${ok} guías importados correctamente`);
}

async function doImportEventos(rows){
  let ok=0, errors=[];
  for(const r of rows){
    const evento = {
      tipo_evento:  String(r.tipo_evento||r['Tipo evento']||r.TipoEvento||'').trim(),
      fecha:        String(r.fecha||r.Fecha||'').trim(),
      hora_inicio:  String(r.hora_inicio||r['Hora inicio']||r.HoraInicio||'').trim(),
      hora_fin:     String(r.hora_fin||r['Hora fin']||r.HoraFin||'').trim()||null,
      prioridad:    String(r.prioridad||r.Prioridad||'REGULAR').toUpperCase().trim(),
      descripcion:  String(r.descripcion||r.Descripcion||r.Descripción||'').trim()||null,
      link_adjunto: String(r.link_adjunto||r['Link adjunto']||'').trim()||null,
      estado:       'A_ASIGNAR',
    };
    if(!evento.tipo_evento||!evento.fecha||!evento.hora_inicio){ errors.push(`Fila sin tipo/fecha/hora`); continue; }
    if(!['URGENTE','REGULAR'].includes(evento.prioridad)) evento.prioridad='REGULAR';

    const {error} = await db.from('eventos').insert(evento);
    if(error) errors.push(`${evento.tipo_evento} ${evento.fecha}: ${error.message}`);
    else ok++;
  }
  await loadAll();
  set({modal:null});
  if(errors.length) toast(`✅ ${ok} importados, ⚠️ ${errors.length} errores`, T.amber);
  else toast(`✅ ${ok} eventos importados correctamente`);
}

            ${isAdminRole?'👑':'👤'}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;color:#1A1A1A">${displayName}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap">
              <span style="background:${isAdminRole?'#1B6B74':'#E9C46A'}20;color:${isAdminRole?'#1B6B74':'#856404'};padding:1px 8px;border-radius:10px;font-weight:700;font-size:10px">${r.role.toUpperCase()}</span>
              ${displayEmail?`<span style="font-size:11px;color:#9E9A93">${displayEmail}</span>`:''}
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button onclick="resetPassword('${r.user_id}','${displayEmail||''}')"

              style="padding:6px 12px;border-radius:6px;border:1px solid #E8E4DD;background:white;font-size:11px;cursor:pointer;color:#1B6B74;font-weight:600;font-family:'DM Sans',sans-serif">
              ✏️ Editar
            </button>
            ${r.user_id !== S.user?.id ? `<button onclick="darDeBajaUsuario('${r.user_id}','${displayName}')"
              style="padding:6px 12px;border-radius:6px;border:1px solid #fcd5d5;background:#fff5f5;font-size:11px;cursor:pointer;color:#E63946;font-weight:600;font-family:'DM Sans',sans-serif">

      }).join('')}

async function resetPassword(userId, email){
  if(!email){ toast('No se encontró el email del usuario', '#E63946'); return; }
  if(!confirm(`¿Enviar email de reset de contraseña a ${email}?`)) return;
  const redirectTo = window.location.origin + window.location.pathname;
  const {error} = await db.auth.resetPasswordForEmail(email, {
    redirectTo: redirectTo,
  });
  if(error){ toast('Error: '+error.message, '#E63946'); return; }
  toast(`✅ Email de reset enviado a ${email}`);
}

async function darDeBajaUsuario(userId, nombre){
  if(!confirm(`¿Dar de baja a ${nombre}? Se eliminará su acceso al sistema.`)) return;
  const {error} = await db.from('user_roles').delete().eq('user_id', userId);
  if(error){ toast('Error: '+error.message, '#E63946'); return; }
  await db.from('historial').insert({
    accion: 'USUARIO_BAJA',
    actor: 'ADMIN',
    detalle: `Usuario ${nombre} dado de baja por ${S.user?.email}`
  });
  toast(`✅ ${nombre} dado de baja`);
  loadUsuariosPanel();
}

function editUsuario(userId, role, guiaId, email=''){
  set({modal:{type:'usuario-form', entry:{user_id:userId, role, guia_id:guiaId, email}}});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  // check recovery hash FIRST before anything else
  if(window.location.hash.includes('type=recovery')){
    set({loading:false, view:'password-reset'});
    render();
    return;
  }

  render();
  // check confirmar_calendario BEFORE auth - no login needed
  const params=new URLSearchParams(window.location.search);
  const calToken=params.get('confirmar_calendario');
  if(calToken){
    set({loading:false});
    await handleConfirmarCalendario(calToken);
    return;
  }
  // check response token
  if(params.get('token')){ set({loading:false}); return; }

  const {data:{session}}=await db.auth.getSession();
  if(session?.user){ set({user:session.user,loading:false}); await loadRole(); await loadAll(); }
  else { set({loading:false}); }

  db.auth.onAuthStateChange((event, session)=>{
    if(event==='PASSWORD_RECOVERY') return; // ignore, handled above
    if(session?.user&&!S.user){set({user:session.user});loadRole().then(()=>loadAll());}
    else if(!session?.user&&S.user){set({user:null,role:null,myGuia:null,guias:[],eventos:[],invitaciones:[],historial:[]});}
  });

  // auto check SLA every 5 min
  setInterval(checkSLA, 5*60*1000);
}
init();
